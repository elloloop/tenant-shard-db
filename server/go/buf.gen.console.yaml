version: v2

# Codegen for the Go server reimplementation — console.v1 surface.
#
# Produces protobuf message stubs and gRPC service stubs from
# proto/console/v1/console.proto into server/go/internal/pb/consolev1/
# (package consolev1).
#
# Run from the repository root (or via `cd server/go && go generate ./...`):
#
#     buf generate --template server/go/buf.gen.console.yaml
#
# The entdb.v1 stubs are generated by the sibling template
# server/go/buf.gen.yaml. Both templates are exercised by the
# `go:generate` directive in server/go/internal/pb/generate.go.
#
# The console proto re-uses request/response messages from entdb.v1
# (it is a curated browser-facing pass-through; see the file header in
# proto/console/v1/console.proto). The `Mentdb.proto=…` plugin opt
# binds those imports to the existing server-side pb package so we
# don't end up with two parallel type trees inside one Go module.
#
# The SDK ships its own console stubs under
# sdk/go/entdb/internal/console/v1/ via the repo-root buf.gen.yaml.
# This template intentionally targets a server-only output path so
# consumers of the SDK don't transitively pull server stubs.

# console.proto declares
#   option go_package = "github.com/elloloop/tenant-shard-db/sdk/go/entdb/internal/console/v1;consolev1";
# pointing at the SDK module. Managed mode rewrites it to the server
# module's path; the trailing `;consolev1` is preserved by buf so the
# Go package name remains `consolev1`.
managed:
  enabled: true
  override:
    - file_option: go_package
      value: github.com/elloloop/tenant-shard-db/server/go/internal/pb/consolev1

plugins:
  - remote: buf.build/protocolbuffers/go:v1.36.11
    out: server/go/internal/pb/consolev1
    opt:
      - paths=source_relative
      # Bind the upstream entdb.proto messages to the server's pb
      # package so console.pb.go references the same Go types the
      # server uses natively for the upstream EntDBService.
      - Mentdb.proto=github.com/elloloop/tenant-shard-db/server/go/internal/pb

  - remote: buf.build/grpc/go:v1.5.1
    out: server/go/internal/pb/consolev1
    opt:
      - paths=source_relative
      - Mentdb.proto=github.com/elloloop/tenant-shard-db/server/go/internal/pb

inputs:
  - directory: proto/console/v1
