version: v2

# Codegen for the Go server reimplementation — entdb.v1 surface.
#
# Produces protobuf message stubs and gRPC service stubs from
# proto/entdb/v1/entdb.proto into server/go/internal/pb/ (package pb).
#
# Run from the repository root (or via `cd server/go && go generate ./...`):
#
#     buf generate --template server/go/buf.gen.yaml
#
# The console-service stubs are generated by the sibling template
# server/go/buf.gen.console.yaml. Both templates are exercised by the
# `go:generate` directive in server/go/internal/pb/generate.go.
#
# The Go SDK has its own checked-in copy of these stubs under
# sdk/go/entdb/internal/pb/; that is intentional. SDK consumers must
# not transitively pull server-only dependencies, so the server module
# (server/go) and the SDK module (sdk/go/entdb) generate the proto
# package independently. The wire format is the contract — both copies
# come from the same .proto.

# entdb.proto declares `option go_package = "github.com/example/entdb/proto/v1"`,
# a placeholder that predates the polyglot layout. Managed mode rewrites
# it to the server module's internal path so the generated files compile
# under the right import path without editing the .proto.
managed:
  enabled: true
  override:
    - file_option: go_package
      value: github.com/elloloop/tenant-shard-db/server/go/internal/pb

plugins:
  - remote: buf.build/protocolbuffers/go:v1.36.11
    out: server/go/internal/pb
    opt:
      - paths=source_relative

  - remote: buf.build/grpc/go:v1.5.1
    out: server/go/internal/pb
    opt:
      - paths=source_relative

inputs:
  - directory: proto/entdb/v1
