version: v2

# Codegen for entdb-console.
#
# Two separate inputs:
#
#   1. The console module (proto/console/v1) — generates Go service stubs
#      AND TS service stubs.
#
#   2. The upstream entdb.proto — for the TS frontend ONLY. The Go side
#      already has `sdk/go/entdb/internal/pb` checked in (generated by
#      `sdk/go/entdb/internal/pb/generate.go`) and we do NOT want to
#      shadow it; the console handlers reuse those existing types.
#
# Run:   buf generate

plugins:
  # ---------------------------------------------------------------------
  # Go — console service stubs only
  # ---------------------------------------------------------------------
  - remote: buf.build/protocolbuffers/go:v1.36.11
    out: sdk/go/entdb/internal/console/v1
    opt:
      - paths=source_relative
      # Bind the upstream entdb.proto messages to the checked-in pb
      # package owned by the SDK so the console handlers can pass
      # through *entdbv1.<Foo>Request without two parallel type trees.
      - Mentdb.proto=github.com/elloloop/tenant-shard-db/sdk/go/entdb/internal/pb

  - remote: buf.build/connectrpc/go:v1.16.2
    out: sdk/go/entdb/internal/console/v1
    opt:
      - paths=source_relative
      - Mentdb.proto=github.com/elloloop/tenant-shard-db/sdk/go/entdb/internal/pb

  # ---------------------------------------------------------------------
  # TypeScript — full surface (console service + upstream messages) so
  # the SPA can construct typed requests/responses for every console RPC.
  # ---------------------------------------------------------------------
  - remote: buf.build/bufbuild/es:v1.10.0
    out: sdk/go/entdb/cmd/entdb-console/frontend/src/gen
    opt:
      - target=ts
      - import_extension=.js
    include_imports: true

  - remote: buf.build/connectrpc/es:v1.6.1
    out: sdk/go/entdb/cmd/entdb-console/frontend/src/gen
    opt:
      - target=ts
      - import_extension=.js
    include_imports: true

inputs:
  - directory: proto/console/v1
