// ============================================================================
// ⚠  INTERNAL TRANSPORT — DO NOT USE DIRECTLY  ⚠
// ============================================================================
//
// This gRPC service is an INTERNAL transport between the EntDB server and the
// official SDKs. It is NOT a stable public API.
//
//   ✗ DO NOT hand-roll a client against this proto (curl, grpcurl, custom
//     stubs in any language). Doing so WILL break: field IDs, actor strings,
//     ACL encoding, idempotency keys, schema fingerprints, and tenant
//     routing have non-obvious invariants enforced by the SDKs.
//   ✗ DO NOT treat the wire format as a public contract. RPCs, fields, and
//     semantics may change without notice between releases.
//
//   ✓ Use the Go SDK:     github.com/elloloop/tenant-shard-db/sdk/go/entdb/v2
//   ✓ Use the Python SDK: pip install entdb-sdk
//
// If your language isn't supported, file an issue — don't reach for the
// proto.
// ============================================================================
//
// EntDB gRPC Service Definition
//
// This file defines the gRPC API for the EntDB database service.
// The API supports node/edge graph operations with tenant isolation.
//
// Key concepts:
// - Every operation requires tenant_id and actor
// - Writes are atomic via ExecuteAtomic RPC
// - Reads are eventually consistent from SQLite views
//
// Compatibility rules:
// - Field numbers are immutable
// - New fields should be optional
// - Deprecated fields should be marked but kept

syntax = "proto3";

package entdb.v1;

import "google/protobuf/struct.proto";

option go_package = "github.com/example/entdb/proto/v1";

// EntDB Service - Main API for database operations
service EntDBService {
    // Execute an atomic transaction containing one or more operations
    // Returns a receipt that can be used to check application status
    rpc ExecuteAtomic(ExecuteAtomicRequest) returns (ExecuteAtomicResponse);

    // Get the status of a previously submitted transaction
    rpc GetReceiptStatus(GetReceiptStatusRequest) returns (GetReceiptStatusResponse);

    // Get a node by ID
    rpc GetNode(GetNodeRequest) returns (GetNodeResponse);

    // Get multiple nodes by IDs
    rpc GetNodes(GetNodesRequest) returns (GetNodesResponse);

    // Query nodes by type with optional filters
    rpc QueryNodes(QueryNodesRequest) returns (QueryNodesResponse);

    // Get outgoing edges from a node
    rpc GetEdgesFrom(GetEdgesRequest) returns (GetEdgesResponse);

    // Get incoming edges to a node
    rpc GetEdgesTo(GetEdgesRequest) returns (GetEdgesResponse);

    // Search mailbox with full-text search
    rpc SearchMailbox(SearchMailboxRequest) returns (SearchMailboxResponse);

    // Get mailbox items for a user
    rpc GetMailbox(GetMailboxRequest) returns (GetMailboxResponse);

    // Get server health and status
    rpc Health(HealthRequest) returns (HealthResponse);

    // Get schema information
    rpc GetSchema(GetSchemaRequest) returns (GetSchemaResponse);

    // List all tenants that have data
    rpc ListTenants(ListTenantsRequest) returns (ListTenantsResponse);

    // List mailbox users for a tenant
    rpc ListMailboxUsers(ListMailboxUsersRequest) returns (ListMailboxUsersResponse);

    // Wait for a specific stream position to be applied
    rpc WaitForOffset(WaitForOffsetRequest) returns (WaitForOffsetResponse);

    // ACL v2 - Get connected nodes with ACL filtering
    rpc GetConnectedNodes(GetConnectedNodesRequest) returns (GetConnectedNodesResponse);

    // ACL v2 - Share a node with an actor
    rpc ShareNode(ShareNodeRequest) returns (ShareNodeResponse);

    // ACL v2 - Revoke access from an actor
    rpc RevokeAccess(RevokeAccessRequest) returns (RevokeAccessResponse);

    // ACL v2 - List nodes shared with the caller
    rpc ListSharedWithMe(ListSharedWithMeRequest) returns (ListSharedWithMeResponse);

    // ACL v2 - Add a member to a group
    rpc AddGroupMember(GroupMemberRequest) returns (GroupMemberResponse);

    // ACL v2 - Remove a member from a group
    rpc RemoveGroupMember(GroupMemberRequest) returns (GroupMemberResponse);

    // ACL v2 - Transfer ownership of a node
    rpc TransferOwnership(TransferOwnershipRequest) returns (TransferOwnershipResponse);

    // User registry CRUD
    rpc CreateUser(CreateUserRequest) returns (CreateUserResponse);
    rpc GetUser(GetUserRequest) returns (GetUserResponse);
    rpc UpdateUser(UpdateUserRequest) returns (UpdateUserResponse);
    rpc ListUsers(ListUsersRequest) returns (ListUsersResponse);

    // Tenant registry CRUD
    rpc CreateTenant(CreateTenantRequest) returns (CreateTenantResponse);
    rpc GetTenant(GetTenantRequest) returns (GetTenantResponse);
    rpc ArchiveTenant(ArchiveTenantRequest) returns (ArchiveTenantResponse);

    // Tenant membership management
    rpc AddTenantMember(TenantMemberRequest) returns (TenantMemberResponse);
    rpc RemoveTenantMember(TenantMemberRequest) returns (TenantMemberResponse);
    rpc GetTenantMembers(GetTenantMembersRequest) returns (GetTenantMembersResponse);
    rpc GetUserTenants(GetUserTenantsRequest) returns (GetUserTenantsResponse);
    rpc ChangeMemberRole(ChangeMemberRoleRequest) returns (ChangeMemberRoleResponse);

    // Admin operations (Issue #90, ADR-003)
    rpc TransferUserContent(TransferUserContentRequest) returns (TransferUserContentResponse);
    rpc DelegateAccess(DelegateAccessRequest) returns (DelegateAccessResponse);
    rpc SetLegalHold(LegalHoldRequest) returns (LegalHoldResponse);
    rpc RevokeAllUserAccess(RevokeAllUserAccessRequest) returns (RevokeAllUserAccessResponse);

    // GDPR operations (Issue #103, ADR-004)
    rpc DeleteUser(DeleteUserRequest) returns (DeleteUserResponse);
    rpc ExportUserData(ExportUserDataRequest) returns (ExportUserDataResponse);
    rpc FreezeUser(FreezeUserRequest) returns (FreezeUserResponse);
    rpc CancelUserDeletion(CancelUserDeletionRequest) returns (CancelUserDeletionResponse);

    // Quota dashboard (ADR: docs/decisions/quotas.md)
    rpc GetTenantQuota(GetTenantQuotaRequest) returns (GetTenantQuotaResponse);

    // Unique-key secondary lookup (2026-04-13 unique_keys decision)
    rpc GetNodeByKey(GetNodeByKeyRequest) returns (GetNodeByKeyResponse);

    // Full-text search across searchable fields (2026-04-19 FTS decision)
    rpc SearchNodes(SearchNodesRequest) returns (SearchNodesResponse);
}

// Common message types

message RequestContext {
    // Tenant identifier (required)
    string tenant_id = 1;

    // Actor performing the operation (required)
    // Format: "user:ID", "system:NAME", etc.
    string actor = 2;

    // Optional trace ID for distributed tracing
    string trace_id = 3;
}

message Receipt {
    // Tenant identifier
    string tenant_id = 1;

    // Idempotency key for the transaction
    string idempotency_key = 2;

    // Stream position where the event was written
    string stream_position = 3;
}

// Execute Atomic - Write operations

message ExecuteAtomicRequest {
    // Request context (required)
    RequestContext context = 1;

    // Idempotency key (optional, generated if not provided)
    string idempotency_key = 2;

    // Schema fingerprint for validation
    string schema_fingerprint = 3;

    // List of operations to execute atomically
    repeated Operation operations = 4;

    // Whether to wait for the event to be applied before returning
    bool wait_applied = 5;

    // Timeout for wait_applied in milliseconds
    int32 wait_timeout_ms = 6;

    // Self-describing write carrier (SELF-DESCRIBING WRITES).
    //
    // The client SDK already knows its schema (client-side registry from
    // register_proto_schema). When the client's ``schema_fingerprint``
    // (field 3) differs from the server's current registry fingerprint,
    // the SDK rides the definitions of the node/edge types this write
    // touches inside ``schema``. The server materializes them into a
    // leading WAL schema op (applied BEFORE the data ops, in the SAME
    // transaction) so replaying the log deterministically rebuilds the
    // registry + per-tenant indexes.
    //
    // Steady state (fingerprints match) carries nothing extra: the SDK
    // omits this field.
    //
    // Conflict policy (establish-or-reject): a type absent from the
    // server registry is registered; a type present and byte-identical is
    // a no-op; a type present but DIFFERENT is rejected. Online
    // evolution / ALTER is out of scope.
    optional SchemaDescriptor schema = 7;
}

// SchemaDescriptor carries a set of node/edge type definitions on the
// wire so a write can be self-describing. It mirrors the cross-language
// schema JSON contract (server/go/internal/schema/types.go) field-for-
// field; the proto field NUMBERS here are wire ids, NOT the schema
// ``field_id`` values (those live in SchemaFieldDef.field_id).
//
// NAME-FREE (ADR-031): types are identified by type_id / edge_id and
// fields by field_id only. No field name, type name, or constraint name
// is carried on the wire — names live only in the client's proto and are
// resolved by the SDK. The ``name`` field numbers are RESERVED so they
// are never reused.
message SchemaDescriptor {
    repeated SchemaNodeTypeDef node_types = 1;
    repeated SchemaEdgeTypeDef edge_types = 2;
}

// SchemaFieldDef mirrors schema.FieldDef. ``field_id`` is the stable
// on-disk/wire field id (the proto field number of the user's own
// message per ADR-018), NOT this message's field numbers. Name-free
// (ADR-031): no field name is carried.
message SchemaFieldDef {
    reserved 2; // was: name (ADR-031 name-free)
    reserved "name";
    uint32 field_id = 1;
    // kind is the schema.FieldKind wire string: str / int / float / bool
    // / timestamp / json / bytes / enum / ref / list_str / list_int /
    // list_ref.
    string kind = 3;
    bool required = 4;
    repeated string enum_values = 5;
    // ref_type_id is required when kind == "ref"; absent otherwise.
    optional int32 ref_type_id = 6;
    bool indexed = 7;
    bool searchable = 8;
    bool deprecated = 9;
    string description = 10;
    bool pii = 11;
    bool unique = 12;
}

// SchemaCompositeUniqueDef mirrors schema.CompositeUniqueDef. Name-free
// (ADR-031): a composite constraint is identified solely by its
// field_ids tuple; no constraint name is carried.
message SchemaCompositeUniqueDef {
    reserved 1; // was: name (ADR-031 name-free)
    reserved "name";
    repeated uint32 field_ids = 2;
}

// SchemaNodeTypeDef mirrors schema.NodeTypeDef. Only the fields the
// server needs to enforce uniqueness / indexes / search / validation are
// carried; GDPR/ACL policy metadata can be added later without breaking
// the wire (additive field numbers). Name-free (ADR-031): identified by
// type_id only.
message SchemaNodeTypeDef {
    reserved 2; // was: name (ADR-031 name-free)
    reserved "name";
    int32 type_id = 1;
    repeated SchemaFieldDef fields = 3;
    bool deprecated = 4;
    string description = 5;
    // data_policy is the schema.DataPolicy wire string (personal /
    // business / financial / audit / ephemeral / healthcare); empty
    // means unset.
    string data_policy = 6;
    // subject_field is the optional GDPR subject field_id (ADR-031:
    // name-free); legal_basis is optional GDPR metadata. Absent means
    // unset.
    optional uint32 subject_field = 7;
    optional string legal_basis = 8;
    repeated SchemaCompositeUniqueDef composite_unique = 9;
}

// SchemaEdgeTypeDef mirrors schema.EdgeTypeDef. Name-free (ADR-031):
// identified by edge_id only.
message SchemaEdgeTypeDef {
    reserved 2; // was: name (ADR-031 name-free)
    reserved "name";
    int32 edge_id = 1;
    int32 from_type_id = 3;
    int32 to_type_id = 4;
    repeated SchemaFieldDef props = 5;
    bool unique_per_from = 6;
    bool deprecated = 7;
    string description = 8;
    // data_policy wire string; empty means unset.
    string data_policy = 9;
    // on_subject_exit is the schema.OnSubjectExit wire string
    // (from / to / both); empty defaults to "both".
    string on_subject_exit = 10;
}

message Operation {
    oneof op {
        CreateNodeOp create_node = 1;
        UpdateNodeOp update_node = 2;
        DeleteNodeOp delete_node = 3;
        CreateEdgeOp create_edge = 4;
        DeleteEdgeOp delete_edge = 5;
        DeleteWhereOp delete_where = 6;
    }
}

// Storage mode for a node (2026-04-13 storage decision).
//
// Storage mode is chosen at creation time and is IMMUTABLE. It cannot
// be changed by ``update_node``. The server enforces the
// ``USER_MAILBOX -> TENANT -> PUBLIC`` privacy hierarchy on edges —
// more-private data can reference less-private data, never the
// reverse.
enum StorageMode {
    // Default — node lives in the tenant SQLite file (tenant_<id>.db)
    // and is sharable via ACL within the tenant.
    STORAGE_MODE_TENANT = 0;

    // Node lives in a per-user SQLite file
    // ({tenant_id}/user_{user_id}.db) and is private to exactly one
    // user. Requires ``target_user_id`` to be set at creation.
    STORAGE_MODE_USER_MAILBOX = 1;

    // Node lives in the singleton public.db and is readable by any
    // tenant.
    STORAGE_MODE_PUBLIC = 2;
}

// EntValue is the typed, lossless carrier for a single payload field
// value (ADR-028). It replaces google.protobuf.Struct's IEEE-754
// double-backed numbers so INTEGER / TIMESTAMP fields preserve the full
// int64 range. Absence of `v` denotes an explicit null.
message EntValue {
    oneof v {
        int64 int_value = 1;                  // INTEGER / TIMESTAMP — lossless
        double double_value = 2;              // DOUBLE
        bool bool_value = 3;                  // BOOLEAN
        string string_value = 4;              // STRING / ENUM
        bytes bytes_value = 5;                // BYTES (no base64-in-a-string)
        google.protobuf.Value json_value = 6; // JSON (arbitrary, dynamically typed)
    }
}

message CreateNodeOp {
    // Node type ID (required)
    int32 type_id = 1;

    // Node ID (optional, generated if not provided)
    string id = 2;

    // Reserved: old JSON string fields
    reserved 3, 4;
    reserved "data_json", "acl_json";

    // Alias for referencing this node in subsequent operations
    string as = 5;

    // Users to fanout this node to
    repeated string fanout_to = 6;

    // Payload as typed Struct
    google.protobuf.Struct data = 7;

    // ACL entries
    repeated AclEntry acl = 8;

    // Storage mode for this node — immutable after creation
    // (2026-04-13 storage decision).
    StorageMode storage_mode = 9;

    // Owning user id for ``STORAGE_MODE_USER_MAILBOX`` nodes. Required
    // when ``storage_mode == STORAGE_MODE_USER_MAILBOX``; ignored for
    // other modes.
    string target_user_id = 10;

    // Field 11 (``map<string, string> keys``) is retired as of the
    // 2026-04-14 SDK v0.3 decision. Unique constraints are now
    // declared at the proto field site with ``(entdb.field).unique =
    // true`` and enforced server-side by a unique expression index
    // on the JSON payload value; the client never has to hand over a
    // parallel keys map.
    reserved 11;
    reserved "keys";

    // Typed, lossless payload (ADR-028). Preferred over `data` when set;
    // the server dual-reads (typed_data first, else `data`). Carries the
    // full int64 range that the Struct `data` field cannot.
    map<uint32, EntValue> typed_data = 12;
}

message UpdateNodeOp {
    // Node type ID (required for validation)
    int32 type_id = 1;

    // Node ID or reference (required)
    string id = 2;

    // Reserved: old JSON string field
    reserved 3;
    reserved "patch_json";

    // Field mask for partial updates
    repeated string field_mask = 4;

    // Patch payload as typed Struct
    google.protobuf.Struct patch = 5;

    // Field 6 (``map<string, string> keys``) is retired as of the
    // 2026-04-14 SDK v0.3 decision. See CreateNodeOp.reserved 11 for
    // the rationale — unique values are carried in the regular
    // ``patch`` payload and enforced by the unique expression index
    // on the referenced field id.
    reserved 6;
    reserved "keys";

    // Optional single-field equality precondition (CAS).
    //
    // When set, the applier compares the node's current value at
    // ``precondition.field`` against ``precondition.equals`` BEFORE
    // applying the patch. If the values do not match — including the
    // case where the field is absent from the stored payload — the
    // ENTIRE batch aborts (no ops commit) and the failure is memoized
    // in the idempotency cache. A retry with the same idempotency key
    // replays the cached failure without re-evaluating against
    // possibly-changed state. Callers re-evaluate by minting a new
    // idempotency key.
    //
    // Equality is the only operator in v1; compound predicates and
    // comparison operators (Lt/Gt/...) are deliberately out of scope.
    // See GitHub issue #500 for the design rationale.
    UpdateNodePrecondition precondition = 7;

    // Typed, lossless patch (ADR-028). Preferred over `patch` when set.
    map<uint32, EntValue> typed_patch = 8;
}

// UpdateNodePrecondition is the single-field equality CAS predicate
// attached to ``UpdateNodeOp.precondition``. Official SDKs accept a
// developer-facing field name and translate it to ``field_id`` before
// sending the request, so schema-less servers can evaluate CAS without
// consulting a registry. The legacy ``field`` name is retained for
// diagnostics and for older clients talking to registry-backed servers.
message UpdateNodePrecondition {
    // Node field name as declared in the proto schema. Official SDKs
    // still let developers specify this name, but send ``field_id`` as
    // the authoritative coordinate. When present, this name is surfaced
    // in PreconditionFailure details.
    string field = 1;

    // The expected current value of ``field``. Encoded as a
    // ``google.protobuf.Value`` so callers can express scalar types
    // (numbers, strings, booleans, null) without a parallel typed
    // union. Lists and structs are accepted on the wire but the
    // applier compares them by JSON-canonical form.
    google.protobuf.Value equals = 2;

    // Stable numeric field id for the node field being compared.
    // This is the preferred and schema-less-safe coordinate. Servers
    // use it directly when it is non-zero; registry-backed servers may
    // fall back to ``field`` only for older clients.
    int32 field_id = 3;

    // Typed, lossless expected value (ADR-028 / #572). Preferred over
    // `equals` when set, so a CAS on an int64 >2^53 field compares the
    // exact value instead of a float64-truncated one.
    EntValue typed_equals = 4;
}

message DeleteNodeOp {
    // Node type ID
    int32 type_id = 1;

    // Node ID (required)
    string id = 2;
}

// DeleteWhereOp is a single-RPC predicate-based sweeper: it deletes
// every node of ``type_id`` whose payload matches ALL of the ``where``
// predicates, inside one ``ExecuteAtomic`` op. It collapses the
// standard "QueryNodes to find ids, then ExecuteAtomic to delete them"
// loop into a single round trip — the TTL-sweeper pattern. See GitHub
// issue #504.
//
// The ``where`` predicates reuse the exact ``FieldFilter`` / ``FilterOp``
// types shipped for ``QueryNodes`` (issue #501), so no new wire concept
// is introduced — Eq/Ne/Lt/Le/Gt/Ge are supported and AND-ed together.
//
// Limit semantics are BEST-EFFORT (Postgres ``DELETE … LIMIT`` style):
// at most ``limit`` matching nodes are deleted in this op; the rest
// remain for a subsequent sweep. This matches sweeper semantics — a
// caller polls until a sweep deletes zero rows. The server caps
// ``limit`` to a server-side maximum so a runaway predicate cannot pin
// the single applier goroutine for one tenant (CLAUDE.md single-applier
// invariant). ``limit <= 0`` means "use the server default cap".
//
// Out of scope for v1 (issue #504): the deleted ids are NOT returned in
// the response — callers that need the ids keep using the
// QueryNodes + DeleteNodeOp loop.
message DeleteWhereOp {
    // Node type ID (required). Only nodes of this type are considered.
    int32 type_id = 1;

    // Predicate filters, AND-ed together. Same shape as
    // ``QueryNodesRequest.filters``. An empty list is rejected
    // (INVALID_ARGUMENT) — an unconditional bulk delete is too
    // dangerous to express implicitly; delete by id or pass an
    // explicit always-true predicate.
    repeated FieldFilter where = 2;

    // Best-effort cap on the number of nodes deleted by this op.
    // ``<= 0`` selects the server default. The server clamps this to
    // its own hard ceiling regardless of the requested value.
    int32 limit = 3;
}

message CreateEdgeOp {
    // Edge type ID (required)
    int32 edge_id = 1;

    // Source node reference
    NodeRef from = 2;

    // Target node reference
    NodeRef to = 3;

    // Reserved: old JSON string field
    reserved 4;
    reserved "props_json";

    // Edge properties as typed Struct
    google.protobuf.Struct props = 5;

    // Typed, lossless props (ADR-028). Preferred over `props` when set.
    map<uint32, EntValue> typed_props = 6;
}

message DeleteEdgeOp {
    // Edge type ID (required)
    int32 edge_id = 1;

    // Source node reference
    NodeRef from = 2;

    // Target node reference
    NodeRef to = 3;
}

message NodeRef {
    oneof ref {
        // Direct node ID
        string id = 1;

        // Reference to aliased node (e.g., "$task.id")
        string alias_ref = 2;

        // Type ID + node ID
        TypedNodeRef typed = 3;
    }
}

message TypedNodeRef {
    int32 type_id = 1;
    string id = 2;
}

message ExecuteAtomicResponse {
    // Whether the operation succeeded
    bool success = 1;

    // Receipt for tracking (present on success)
    Receipt receipt = 2;

    // Error message (present on failure)
    string error = 3;

    // Error code for programmatic handling
    string error_code = 4;

    // IDs of created nodes (in order of operations)
    repeated string created_node_ids = 5;

    // Application status (if wait_applied was true)
    ReceiptStatus applied_status = 6;

    // Structured precondition-failure detail. Populated when
    // ``applied_status == RECEIPT_STATUS_FAILED_PRECONDITION`` so the
    // SDK can surface a typed error without re-fetching state.
    PreconditionFailure precondition_failure = 7;
}

// PreconditionFailure carries the coordinates of a CAS miss inside an
// ExecuteAtomic batch so the caller can log/decide without a second
// round trip. See ``UpdateNodeOp.precondition`` and GitHub issue #500
// for the full design.
message PreconditionFailure {
    // Zero-based index of the failing op within
    // ``ExecuteAtomicRequest.operations``.
    int32 op_index = 1;

    // Field name the precondition referenced (handler-resolved from the
    // wire ``UpdateNodePrecondition.field``).
    string field = 2;

    // Value the precondition expected.
    google.protobuf.Value expected = 3;

    // Value the applier observed at the moment of evaluation. Absent
    // fields collapse to a ``NullValue`` so consumers can distinguish
    // "field missing" from "field set to JSON null" by inspecting the
    // ``Value`` kind.
    google.protobuf.Value observed = 4;
}

// Receipt Status

message GetReceiptStatusRequest {
    RequestContext context = 1;
    string idempotency_key = 2;
}

message GetReceiptStatusResponse {
    ReceiptStatus status = 1;
    string error = 2;

    // Populated when ``status == RECEIPT_STATUS_FAILED_PRECONDITION``
    // so a polling caller can reconstruct the same typed error that
    // the originating ``ExecuteAtomic`` call would have produced. See
    // GitHub issue #500.
    PreconditionFailure precondition_failure = 3;
}

enum ReceiptStatus {
    RECEIPT_STATUS_UNKNOWN = 0;
    RECEIPT_STATUS_PENDING = 1;
    RECEIPT_STATUS_APPLIED = 2;
    RECEIPT_STATUS_FAILED = 3;
    // The batch was rejected because a conditional ``UpdateNodeOp``
    // precondition was not met. The full failure coordinates live in
    // ``ExecuteAtomicResponse.precondition_failure``. See GitHub issue
    // #500.
    RECEIPT_STATUS_FAILED_PRECONDITION = 4;
}

// Read operations

message GetNodeRequest {
    RequestContext context = 1;
    int32 type_id = 2;
    string node_id = 3;

    // Wait for this stream position to be applied before reading
    string after_offset = 10;
    int32 wait_timeout_ms = 11;

    // Mailbox scope (#568). When set, the read is restricted to the named
    // user's USER_MAILBOX nodes: a node that is not a mailbox node owned
    // by this user reads as not-found (the privacy boundary). Empty (the
    // default) is an ordinary tenant read, unchanged. The value is a bare
    // user id (e.g. "alice"), not a "user:alice" principal — the SDK does
    // the wire translation.
    string target_user = 12;
}

message GetNodeResponse {
    Node node = 1;
    bool found = 2;
}

message GetNodesRequest {
    RequestContext context = 1;
    int32 type_id = 2;
    repeated string node_ids = 3;

    // Wait for this stream position to be applied before reading
    string after_offset = 10;
    int32 wait_timeout_ms = 11;

    // Mailbox scope (#568). Same semantics as GetNodeRequest.target_user:
    // when set, only the named user's USER_MAILBOX nodes are returned;
    // every other requested id lands in missing_ids.
    string target_user = 12;
}

message GetNodesResponse {
    repeated Node nodes = 1;
    repeated string missing_ids = 2;
}

message QueryNodesRequest {
    RequestContext context = 1;
    int32 type_id = 2;

    // Reserved: old JSON string field
    reserved 3;
    reserved "filter_json";

    // Pagination.
    //
    // `limit`/`offset` are the legacy LIMIT/OFFSET shape. `offset` is
    // DEPRECATED (ADR-029): it is O(n) to skip and skips/duplicates rows
    // under concurrent writes. New code uses keyset cursor pagination via
    // `page_size` + `page_token` below.
    int32 limit = 4;
    int32 offset = 5 [deprecated = true];

    // Sort order
    string order_by = 6;
    bool descending = 7;

    // Typed filter conditions
    repeated FieldFilter filters = 8;

    // Wait for this stream position to be applied before reading
    string after_offset = 10;
    int32 wait_timeout_ms = 11;

    // Keyset cursor pagination (ADR-029, AIP-158).
    //
    // `page_size` bounds one page (defaults to 100, clamped to 1000); it
    // is an alias for `limit` and takes precedence when both are set.
    // `page_token` is the opaque `next_page_token` from a prior response;
    // it encodes a keyset seek over `(order_by, node_id)` plus a
    // fingerprint of the query, so the server resumes exactly after the
    // last row without skip/duplicate under concurrent writes. A token
    // presented against a different query (type_id / filters / order_by)
    // is rejected with INVALID_ARGUMENT, as is mixing `page_token` with
    // the deprecated `offset`.
    int32 page_size = 12;
    string page_token = 13;

    // Mailbox scope (#568). When set, the query is restricted to the named
    // user's USER_MAILBOX nodes (target_user_id == target_user AND
    // storage_mode == USER_MAILBOX). Empty (the default) is an ordinary
    // tenant query, unchanged — tenant queries never see mailbox-private
    // rows. The value is a bare user id, not a principal.
    string target_user = 14;
}

message QueryNodesResponse {
    repeated Node nodes = 1;
    int32 total_count = 2;
    bool has_more = 3;

    // Opaque keyset cursor for the next page (ADR-029). Empty when the
    // last page has been reached. A non-empty value MUST be followed to
    // retrieve the remainder — a response that omits rows always sets it,
    // so reads never silently truncate.
    string next_page_token = 4;
}

message Node {
    string tenant_id = 1;
    string node_id = 2;
    int32 type_id = 3;

    // Reserved: old JSON string fields
    reserved 4, 8;
    reserved "payload_json", "acl_json";

    int64 created_at = 5;
    int64 updated_at = 6;
    string owner_actor = 7;

    // Payload as typed Struct
    google.protobuf.Struct payload = 9;

    // Typed, lossless payload (ADR-028). Populated alongside `payload`;
    // newer SDKs read this, older SDKs fall back to `payload`.
    map<uint32, EntValue> typed_payload = 11;

    // ACL entries
    repeated AclEntry acl = 10;
}

