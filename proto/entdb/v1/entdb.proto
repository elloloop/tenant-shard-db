// ACL and filter types

// Universal, built-in capabilities. Mirror of
// ``entdb.CoreCapability`` in entdb_options.proto — kept here so that
// server ACL wire messages do not depend on the user options import.
enum CoreCapability {
    CORE_CAP_UNSPECIFIED = 0;
    CORE_CAP_READ = 1;
    CORE_CAP_COMMENT = 2;
    CORE_CAP_EDIT = 3;
    CORE_CAP_DELETE = 4;
    CORE_CAP_ADMIN = 5;
}

message AclEntry {
    // Deprecated name field (kept for wire compatibility during
    // migration). Format: ``user:<id>`` / ``group:<id>`` /
    // ``service:<id>`` / ``tenant:<id>``.
    string principal = 1;

    // Deprecated string permission (``read`` / ``write`` / ``admin``
    // / ``deny``). New clients should populate ``core_caps`` /
    // ``ext_cap_ids`` instead.
    string permission = 2 [deprecated = true];

    // Grantee — equivalent to ``principal`` but using the naming
    // from the 2026-04-13 ACL decision. If both are set,
    // ``grantee`` wins.
    string grantee = 3;

    // The node type whose capability space ``ext_cap_ids`` refers to.
    // For purely ``core_caps``-only grants this may be 0.
    int32 type_id = 4;

    // Universal capabilities (``CoreCapability`` values).
    repeated CoreCapability core_caps = 5;

    // Type-specific extension capability enum values.
    repeated int32 ext_cap_ids = 6;

    // Optional expiry (unix millis).
    int64 expires_at = 7;
}

message FieldFilter {
    string field = 1;
    FilterOp op = 2;
    google.protobuf.Value value = 3;

    // Typed, lossless filter value (ADR-028 / #572). Preferred over
    // `value` when set, so an int64 >2^53 filter matches the right rows
    // instead of corrupting through google.protobuf.Value's double.
    EntValue typed_value = 4;
}

enum FilterOp {
    EQ = 0;
    NEQ = 1;
    GT = 2;
    GTE = 3;
    LT = 4;
    LTE = 5;
    CONTAINS = 6;
    IN = 7;
}

// Wait for offset - read-after-write consistency

message WaitForOffsetRequest {
    RequestContext context = 1;
    string stream_position = 2;
    int32 timeout_ms = 3;
}

message WaitForOffsetResponse {
    bool reached = 1;
    string current_position = 2;
}

