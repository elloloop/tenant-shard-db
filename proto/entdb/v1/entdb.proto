// Unique-key secondary lookup
// (2026-04-14 SDK v0.3 decision, supersedes 2026-04-13 unique_keys).
// ``field_id`` replaces the former ``key_name`` string — the key is
// a proto field on the type, not a separate named slot. The server
// runs the lookup against the unique expression index on
// ``json_extract(payload_json, '$."<field_id>"')``.

message GetNodeByKeyRequest {
    string tenant_id = 1;
    string actor = 2;
    int32 type_id = 3;
    // Retired: used to be ``string key_name = 4`` / ``string
    // key_value = 5``. Unique lookups are now expressed as a
    // ``(field_id, value)`` pair.
    reserved 4, 5;
    reserved "key_name", "key_value";
    // Optional read-after-write wait — the server blocks until the
    // applier has caught up to ``after_offset`` before resolving the
    // key. Empty / zero means "read whatever is currently applied".
    int64 after_offset = 6;
    // Field id of the unique key on the node type's proto schema
    // (e.g. ``1`` for ``string email = 1 [(entdb.field).unique =
    // true]``).
    int32 field_id = 7;
    // JSON-encoded value bound to the field. Using ``google.protobuf.Value``
    // keeps the request agnostic to the field's scalar type (string,
    // int, float, bool) while staying typed end-to-end.
    google.protobuf.Value value = 8;

    // Typed, lossless unique-key value (ADR-028 / #572). Preferred over
    // `value`, so a large int64 unique key (Snowflake/external id)
    // matches exactly instead of corrupting through a double.
    EntValue typed_value = 9;
}

message GetNodeByKeyResponse {
    Node node = 1;
    bool found = 2;
}

// Full-text search (2026-04-19 FTS decision)

message SearchNodesRequest {
    string tenant_id = 1;
    string actor = 2;
    int32 type_id = 3;
    // FTS5 match expression (supports AND/OR/NOT/phrase/prefix)
    string query = 4;
    int32 limit = 5;

    // Offset paging is RETAINED here, NOT keyset (ADR-029 FTS carve-out).
    // FTS5 `rank` is computed by the MATCH and cannot be filtered in a
    // WHERE seek, so it is not a stable keyset column. Search is
    // relevance-ranked top-N; deep-paging ranked results is an
    // anti-pattern. `page_size` is an alias for `limit` and takes
    // precedence when both are set; `offset` advances within the ranked
    // result set.
    int32 offset = 6;
    int32 page_size = 7;

    // Mailbox scope (#568). When set, the FTS search is restricted to the
    // named user's USER_MAILBOX nodes. Empty (the default) is an ordinary
    // tenant search, unchanged. The value is a bare user id, not a
    // principal.
    string target_user = 8;
}

message SearchNodesResponse {
    repeated Node nodes = 1;

    // True when the ranked result set has more rows beyond this page.
    // Page with `offset` to fetch the next slice. There is NO
    // `next_page_token` for search — ranked results are offset-paged, not
    // cursor-paged (ADR-029 FTS carve-out).
    bool has_more = 2;
}
