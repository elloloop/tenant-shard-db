    // normalised to ``user:<id>`` by the server.
    string actor_id = 3;
    // Deprecated string permission. Clients should populate
    // ``core_caps`` / ``ext_cap_ids`` instead.
    string permission = 4 [deprecated = true];
    string actor_type = 5;
    int64 expires_at = 6;

    // Typed grant fields (2026-04-13 ACL decision). When set, the
    // server persists these verbatim. When empty, the server derives
    // them from ``permission`` for backwards compatibility.
    int32 type_id = 7;
    repeated CoreCapability core_caps = 8;
