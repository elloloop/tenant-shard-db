// EntDB Console — curated, browser-facing API.
//
// This proto file is the LITERAL access policy for the entdb-console binary.
// Every RPC the browser is allowed to call MUST be declared here. Anything
// not listed is unreachable from the SPA — the ConnectRPC handler has no
// route for it, full stop. This is intentional: the proto is the security
// boundary, not a stylistic choice.
//
// Each RPC reuses the request/response messages from the upstream
// `entdb.v1.EntDBService` proto so each Console handler is a one-line
// pass-through to the upstream gRPC client. Adding a new RPC therefore
// requires touching this file (and getting it through review) rather
// than just exposing whatever the upstream happens to support.
//
// Scope (PR 2): read-only RPCs from PR 1, plus narrow sandbox-only
// CREATE write RPCs (`SandboxCreateNode`, `SandboxCreateEdge`). Writes
// are gated to a single configured sandbox tenant; the console binary
// rejects any other tenant id at the handler. The sandbox RPCs use
// narrow request/response messages defined in this file (NOT
// `entdb.v1.ExecuteAtomicRequest`) so the browser can never construct
// a multi-op transaction or target arbitrary fields outside the
// curated CREATE shape. The handler builds the underlying single-op
// `ExecuteAtomicRequest` itself before forwarding upstream.

syntax = "proto3";

package entdb.console.v1;

import "entdb.proto";
import "google/protobuf/struct.proto";

option go_package = "github.com/elloloop/tenant-shard-db/sdk/go/entdb/internal/console/v1;consolev1";

// Console — curated read-only surface for the EntDB web console.
//
// All RPCs forward to the upstream `entdb.v1.EntDBService` after the
// console binary attaches the configured API key as a Bearer token on
// the outgoing gRPC metadata. The console NEVER calls upstream RPCs
// not listed here.
service Console {
  // Liveness/readiness probe for the console binary itself. Forwards to
  // upstream Health so the response also reflects upstream availability.
  rpc Health(entdb.v1.HealthRequest) returns (entdb.v1.HealthResponse);

  // List tenants the configured caller can see.
  rpc ListTenants(entdb.v1.ListTenantsRequest) returns (entdb.v1.ListTenantsResponse);

  // Get a tenant by id.
  rpc GetTenant(entdb.v1.GetTenantRequest) returns (entdb.v1.GetTenantResponse);

  // Get the active schema (optionally for a specific type).
  rpc GetSchema(entdb.v1.GetSchemaRequest) returns (entdb.v1.GetSchemaResponse);

  // Query nodes by type with typed filters + pagination.
  rpc QueryNodes(entdb.v1.QueryNodesRequest) returns (entdb.v1.QueryNodesResponse);

  // Get a single node by id.
  rpc GetNode(entdb.v1.GetNodeRequest) returns (entdb.v1.GetNodeResponse);

  // Outgoing edges from a node.
  rpc GetEdgesFrom(entdb.v1.GetEdgesRequest) returns (entdb.v1.GetEdgesResponse);

  // Incoming edges to a node.
  rpc GetEdgesTo(entdb.v1.GetEdgesRequest) returns (entdb.v1.GetEdgesResponse);

  // Connected nodes (ACL-filtered) for a graph view.
  rpc GetConnectedNodes(entdb.v1.GetConnectedNodesRequest) returns (entdb.v1.GetConnectedNodesResponse);

  // Search a user mailbox.
  rpc SearchMailbox(entdb.v1.SearchMailboxRequest) returns (entdb.v1.SearchMailboxResponse);

  // ---- Sandbox writes (PR 2) ---------------------------------------
  //
  // Both RPCs are gated server-side to the configured sandbox tenant.
  // They are NOT a general-purpose write surface: the browser can
  // create a node or an edge in the sandbox, and that is it. No
  // updates, no deletes, no batch operations, no targeting other
  // tenants. The narrow request shape is the access policy.

  // Create a single node in the configured sandbox tenant.
  //
  // The handler:
  //   1. Rejects with `unimplemented` if no sandbox tenant is configured.
  //   2. Rejects with `permission_denied` if `tenant_id` does not match
  //      the configured sandbox tenant.
  //   3. Builds a single-op `entdb.v1.ExecuteAtomicRequest` with
  //      `wait_applied = true` so success means the write is applied,
  //      not just queued.
  rpc SandboxCreateNode(SandboxCreateNodeRequest) returns (SandboxCreateNodeResponse);

  // Create a single edge in the configured sandbox tenant. Same gating
  // semantics as `SandboxCreateNode`.
  rpc SandboxCreateEdge(SandboxCreateEdgeRequest) returns (SandboxCreateEdgeResponse);
}

// SandboxCreateNodeRequest — narrow CREATE shape for the sandbox.
//
// Wire-format invariant: `payload` is keyed by the schema's numeric
// field id (e.g. `{"1": "value"}`), matching the on-disk format used
// by the rest of the system. The frontend does NOT translate
// name-keyed payloads to id-keyed; the user is expected to consult
// the schema page to know what field ids to write. This is a
// debug-tool deliberate non-feature for v1.
message SandboxCreateNodeRequest {
  // Tenant id; MUST equal the console's configured sandbox tenant.
  // Rejected with `permission_denied` otherwise.
  string tenant_id = 1;

  // Actor performing the write, in `user:<id>` / `system:<name>` form.
  // The handler does NOT fall back to a server-side default — the
  // SPA pre-fills this from `--sandbox-default-actor`, but the wire
  // value is what the upstream sees.
  string actor = 2;

  // Node type id (numeric, from the schema).
  int32 type_id = 3;

  // Id-keyed payload (see message-level comment).
  google.protobuf.Struct payload = 4;

  // Optional idempotency key. Generated upstream if empty.
  string idempotency_key = 5;
}

message SandboxCreateNodeResponse {
  // Id of the newly created node, as assigned by upstream.
  string node_id = 1;

  // Idempotency key (echoed from request, or upstream-generated).
  string idempotency_key = 2;

  // WAL stream position where the create event was written.
  string stream_position = 3;
}

// SandboxCreateEdgeRequest — narrow CREATE shape for sandbox edges.
//
// `from_node_id` and `to_node_id` are direct node ids (no aliases, no
// cross-op references — that's a multi-op transaction shape we
// deliberately do not expose to the browser).
message SandboxCreateEdgeRequest {
  // Tenant id; MUST equal the console's configured sandbox tenant.
  string tenant_id = 1;

  // Actor performing the write.
  string actor = 2;

  // Edge type id (numeric, from the schema).
  int32 edge_type_id = 3;

  // Source node id.
  string from_node_id = 4;

  // Target node id.
  string to_node_id = 5;

  // Optional id-keyed edge properties.
  google.protobuf.Struct props = 6;

  // Optional idempotency key.
  string idempotency_key = 7;
}

// SandboxCreateEdgeResponse — note there is intentionally no
// `edge_id` field. Upstream `ExecuteAtomicResponse` does not surface
// a server-assigned edge id (edges are keyed by `(edge_type_id, from,
// to)` in the canonical store), so there's nothing meaningful to
// return. If a future schema makes edge ids first-class, that's a
// new field at the next field number.
message SandboxCreateEdgeResponse {
  // Idempotency key (echoed or upstream-generated).
  string idempotency_key = 1;

  // WAL stream position where the create event was written.
  string stream_position = 2;
}
