# EntDB monorepo — root pyproject.
#
# This file is NOT an installable package. It hosts shared dev tooling
# config (ruff, mypy, pytest, coverage) for the polyglot workspace.
# Installable Python packages live under:
#   - sdk/python/pyproject.toml     (entdb-sdk, MIT)
# (The Python server was retired in Phase 4D of EPIC #407; the server
# lives at server/go/ now.)

# =============================================================================
# Ruff (linter)
# =============================================================================
[tool.ruff]
target-version = "py310"
line-length = 100
exclude = [
    ".git",
    ".venv",
    "__pycache__",
    "build",
    "dist",
    "*_generated*",
    "*/generated/*",
]

[tool.ruff.lint]
select = [
    "E",      # pycodestyle errors
    "W",      # pycodestyle warnings
    "F",      # pyflakes
    "I",      # isort
    "B",      # flake8-bugbear
    "C4",     # flake8-comprehensions
    "UP",     # pyupgrade
    "ARG",    # flake8-unused-arguments
    "SIM",    # flake8-simplify
]
ignore = [
    "E501",   # line too long (handled by formatter)
    "E402",   # module level import not at top of file
    "B008",   # do not perform function calls in argument defaults
    "B904",   # raise without from in except (sometimes intentional)
    "C901",   # too complex
    "ARG001", # unused function argument
    "ARG002", # unused method argument
    "SIM102", # nested if (sometimes clearer)
    "SIM105", # contextlib.suppress doesnt work with async
]

[tool.ruff.lint.isort]
known-first-party = ["entdb_sdk"]

# =============================================================================
# Mypy (type checker)
# =============================================================================
[tool.mypy]
python_version = "3.10"
warn_return_any = true
warn_unused_ignores = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true
ignore_missing_imports = true
show_error_codes = true
strict_optional = true
mypy_path = "sdk/python"
exclude = [
    "_generated/",
    "api/generated/",
]

[[tool.mypy.overrides]]
module = [
    "aiokafka.*",
    "aiobotocore.*",
    "grpc.*",
    "aiohttp.*",
]
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = [
    "entdb_sdk._generated",
    "entdb_sdk._generated.*",
]
follow_imports = "skip"
ignore_errors = true

# =============================================================================
# Pytest
# =============================================================================
[tool.pytest.ini_options]
minversion = "7.0"
testpaths = ["tests/python"]
pythonpath = ["sdk/python"]
python_files = ["test_*.py", "*_test.py", "bench_*.py"]
python_functions = ["test_*", "bench_*"]
asyncio_mode = "auto"
addopts = [
    "-v",
    "--tb=short",
    "--strict-markers",
    "-ra",
]
markers = [
    "unit: Unit tests (no external dependencies)",
    "integration: Integration tests (require SQLite)",
    "e2e: End-to-end tests (require full stack)",
    "slow: Slow tests",
]
filterwarnings = [
    "ignore::DeprecationWarning",
]
timeout = 60

# =============================================================================
# Coverage
# =============================================================================
[tool.coverage.run]
source = ["sdk/python/entdb_sdk"]
branch = true
omit = [
    "*/tests/*",
    "*/__pycache__/*",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "raise NotImplementedError",
    "if TYPE_CHECKING:",
    "if __name__ == .__main__.:",
]
show_missing = true
precision = 2
