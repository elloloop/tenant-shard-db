//
// Schema for the runnable docs examples.
//
// The type_id / field_id / edge_id numbers below MUST match the
// server's "contract" seed profile (server/go/internal/testseed:
// RegisterContractSchema) so the examples can run end-to-end against
// the same harness the integration suite uses:
//
//   User       type_id 1   field 1 = email, field 2 = name
//   Task       type_id 2   field 1 = title, field 2 = description
//   AssignedTo edge_id 100  Task -> User
//
// Regenerate the Python stub after editing:
//
//   python -m grpc_tools.protoc \
//     --python_out=examples \
//     --proto_path=examples \
//     --proto_path=sdk/python/entdb_sdk/proto \
//     examples/example_schema.proto

syntax = "proto3";

package entdb.examples;

import "entdb_options.proto";

message User {
    option (entdb.node) = {
        type_id: 1
        description: "Example user (matches contract-seed User)"
    };

    string email = 1 [(entdb.field) = { unique: true }];
    string name  = 2 [(entdb.field) = { searchable: true }];
}

message Task {
    option (entdb.node) = {
        type_id: 2
        description: "Example task (matches contract-seed Task)"
    };

    string title       = 1 [(entdb.field) = { searchable: true }];
    string description  = 2;
}

message AssignedTo {
    option (entdb.edge) = {
        edge_id: 100
        name: "AssignedTo"
        description: "Task assigned to a User"
    };
}
