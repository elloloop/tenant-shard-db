name: Benchmarks

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write
  deployments: write

env:
  PYTHON_VERSION: "3.11"

jobs:
  benchmark:
    name: Run Benchmarks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv python install ${{ env.PYTHON_VERSION }}
      - run: uv venv && uv pip install -e ".[dev]" pytest-benchmark==5.2.3

      - name: Run benchmarks
        run: |
          uv run pytest tests/benchmarks/ -v \
            --benchmark-only \
            --benchmark-json=benchmark-results.json \
            --benchmark-min-rounds=5

      - name: Run cost model
        run: |
          uv run pytest tests/benchmarks/bench_archiver.py::TestCostModel -v -s \
            --no-header 2>&1 | tee cost-report.txt

      - name: Run compression analysis
        run: |
          uv run pytest tests/benchmarks/bench_archiver.py::TestCompressionRatio -v -s \
            --no-header 2>&1 | tee compression-report.txt

      - name: Store benchmark results
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: 'pytest'
          output-file-path: benchmark-results.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          alert-threshold: '150%'
          comment-on-alert: true
          fail-on-alert: false
          benchmark-data-dir-path: 'dev/bench'

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-reports
          path: |
            benchmark-results.json
            cost-report.txt
            compression-report.txt
