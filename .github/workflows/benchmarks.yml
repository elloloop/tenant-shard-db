name: Benchmarks

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write
  deployments: write

env:
  PYTHON_VERSION: "3.11"

jobs:
  benchmark:
    name: Run Benchmarks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - run: uv python install ${{ env.PYTHON_VERSION }}
      - run: |
          uv venv
          uv pip install -e ./sdk/python \
            "pytest>=8.0.0" "pytest-asyncio>=0.23.0" "pytest-cov>=4.1.0" \
            "pytest-timeout>=2.2.0" "ruff>=0.15.0" "mypy>=1.8.0" "httpx>=0.26.0" \
            "grpcio-tools>=1.60.0" pytest-benchmark==5.2.3

      - name: Pre-build Go entdb-server binary
        run: |
          cd server/go && go build -o "$RUNNER_TEMP/entdb-server" ./cmd/entdb-server
          echo "ENTDB_GO_BINARY=$RUNNER_TEMP/entdb-server" >> "$GITHUB_ENV"

      - name: Run benchmarks
        env:
          ENTDB_SERVER_TARGET: go
        run: |
          uv run pytest tests/python/benchmarks/ -v \
            --benchmark-only \
            --benchmark-json=benchmark-results.json \
            --benchmark-min-rounds=5

      - name: Store benchmark results
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: 'pytest'
          output-file-path: benchmark-results.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          alert-threshold: '150%'
          comment-on-alert: true
          fail-on-alert: false
          benchmark-data-dir-path: 'dev/bench'

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-reports
          path: |
            benchmark-results.json
