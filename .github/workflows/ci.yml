name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.11"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Compute which kinds of files changed so heavy jobs can skip when
  # they're irrelevant (e.g. unit tests on a Dockerfile-only change).
  # Path-filter is fast (~5s); the savings on the heavy jobs are large.
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      python: ${{ steps.filter.outputs.python }}
      go: ${{ steps.filter.outputs.go }}
      docker: ${{ steps.filter.outputs.docker }}
      ci: ${{ steps.filter.outputs.ci }}
      schema: ${{ steps.filter.outputs.schema }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          # On `push` events to main/develop the action diffs against
          # the previous commit; on PRs it diffs against the base ref.
          # `pyproject.toml` is in every filter because it can change
          # what gets installed in any environment.
          filters: |
            python:
              - 'server/python/**'
              - 'sdk/python/entdb_sdk/**'
              - 'tests/python/**'
              - 'pyproject.toml'
              - 'server/python/pyproject.toml'
              - 'sdk/python/pyproject.toml'
              - '.github/workflows/ci.yml'
            go:
              - 'sdk/go/**'
              - 'server/go/**'
              - '.github/workflows/ci.yml'
            docker:
              - 'Dockerfile'
              - 'docker-compose*.yml'
              - 'tests/python/e2e/**'
              - 'pyproject.toml'
              - 'server/python/pyproject.toml'
              - '.github/workflows/ci.yml'
            ci:
              - '.github/workflows/**'
            schema:
              - 'server/python/entdb_server/schema/**'
              - 'proto/entdb/v1/**.proto'
              - 'sdk/python/entdb_sdk/schema*'
              - '.schema-snapshot.json'
              - '.github/workflows/ci.yml'

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Run ruff
        run: uvx ruff@0.15.7 check .

      - name: Run ruff format check
        run: uvx ruff@0.15.7 format --check .

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.python == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv python install ${{ env.PYTHON_VERSION }}
      - run: |
          uv venv
          uv pip install -e ./server/python -e ./sdk/python \
            "pytest>=8.0.0" "pytest-asyncio>=0.23.0" "pytest-cov>=4.1.0" \
            "pytest-timeout>=2.2.0" "ruff>=0.15.0" "mypy>=1.8.0" "httpx>=0.26.0" \
            "grpcio-tools>=1.60.0"

      - name: Run mypy
        continue-on-error: true
        run: uv run mypy server/python sdk/python --exclude '(_generated|api/generated)'

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.python == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv python install ${{ env.PYTHON_VERSION }}
      - run: |
          uv venv
          uv pip install -e ./server/python -e ./sdk/python \
            "pytest>=8.0.0" "pytest-asyncio>=0.23.0" "pytest-cov>=4.1.0" \
            "pytest-timeout>=2.2.0" "ruff>=0.15.0" "mypy>=1.8.0" "httpx>=0.26.0" \
            "grpcio-tools>=1.60.0" pytest-xdist==3.5.0

      - name: Run unit tests (parallel)
        run: uv run pytest tests/python/unit -v -n auto --cov=entdb_server --cov=entdb_sdk --cov-report=xml

      - uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.python == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv python install ${{ env.PYTHON_VERSION }}
      - run: |
          uv venv
          uv pip install -e ./server/python -e ./sdk/python \
            "pytest>=8.0.0" "pytest-asyncio>=0.23.0" "pytest-cov>=4.1.0" \
            "pytest-timeout>=2.2.0" "ruff>=0.15.0" "mypy>=1.8.0" "httpx>=0.26.0" \
            "grpcio-tools>=1.60.0" pytest-xdist==3.5.0

      - name: Run integration tests (parallel)
        run: uv run pytest tests/python/integration -v -n auto

  schema-compat:
    name: Schema Compatibility Check
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.schema == 'true' || needs.changes.outputs.python == 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v4
      - run: uv python install ${{ env.PYTHON_VERSION }}
      - run: |
          uv venv
          uv pip install -e ./server/python -e ./sdk/python \
            pytest>=8.0.0 pytest-asyncio>=0.23.0 pytest-cov>=4.1.0 \
            pytest-timeout>=2.2.0 ruff>=0.15.0 mypy>=1.8.0 httpx>=0.26.0 \
            grpcio-tools>=1.60.0

      - name: Check schema compatibility
        run: |
          if [ -f ".schema-snapshot.json" ]; then
            uv run python -m entdb_server.tools.schema_cli check --baseline .schema-snapshot.json
          else
            echo "No schema baseline found, skipping compatibility check"
          fi

  docker-build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.docker == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: ${{ env.IMAGE_NAME }}:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
          target: server

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [changes, docker-build]
    if: needs.changes.outputs.docker == 'true' || needs.changes.outputs.python == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - run: |
          chmod +x tests/python/e2e/run-e2e.sh
          tests/python/e2e/run-e2e.sh --logs

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          ignore-unfixed: true

  # Aggregator job for branch protection. `if: always()` so it runs even
  # when upstream jobs were skipped by path filters; the script then
  # fails only if a non-skipped job didn't succeed. Skipped == OK.
  all-checks:
    name: All Checks Passed
    runs-on: ubuntu-latest
    if: always()
    needs: [lint, type-check, unit-tests, integration-tests, schema-compat, docker-build, e2e-tests, security-scan]
    steps:
      - name: Verify required checks
        env:
          NEEDS: ${{ toJSON(needs) }}
        run: |
          set -euo pipefail
          echo "$NEEDS" | jq .
          if echo "$NEEDS" | jq -e 'to_entries | any(.value.result == "failure" or .value.result == "cancelled")' >/dev/null; then
            echo "::error::At least one upstream job failed or was cancelled"
            exit 1
          fi
          echo "All required checks passed (skipped checks counted as success)"
