name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.11"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  UV_SYSTEM_PYTHON: 1

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Run ruff
        run: uvx ruff@0.15.7 check .

      - name: Run ruff format check
        run: uvx ruff@0.15.7 format --check .

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv python install ${{ env.PYTHON_VERSION }}
      - run: uv venv && uv pip install -e ".[dev]"

      - name: Run mypy
        continue-on-error: true
        run: uv run mypy dbaas sdk --exclude '(_generated|api/generated)'

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv python install ${{ env.PYTHON_VERSION }}
      - run: uv venv && uv pip install -e ".[dev]" pytest-xdist==3.5.0

      - name: Run unit tests (parallel)
        run: uv run pytest tests/unit -v -n auto --cov=dbaas --cov=sdk --cov-report=xml

      - uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv python install ${{ env.PYTHON_VERSION }}
      - run: uv venv && uv pip install -e ".[dev]" pytest-xdist==3.5.0

      - name: Run integration tests (parallel)
        run: uv run pytest tests/integration -v -n auto

  schema-compat:
    name: Schema Compatibility Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v4
      - run: uv python install ${{ env.PYTHON_VERSION }}
      - run: uv venv && uv pip install -e ".[dev]"

      - name: Check schema compatibility
        run: |
          if [ -f ".schema-snapshot.json" ]; then
            uv run python -m dbaas.entdb_server.tools.schema_cli check --baseline .schema-snapshot.json
          else
            echo "No schema baseline found, skipping compatibility check"
          fi

  docker-build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: ${{ env.IMAGE_NAME }}:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
          target: server

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [docker-build]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - run: |
          chmod +x tests/e2e/run-e2e.sh
          tests/e2e/run-e2e.sh --logs

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          ignore-unfixed: true

  all-checks:
    name: All Checks Passed
    runs-on: ubuntu-latest
    needs: [lint, unit-tests, integration-tests, docker-build, e2e-tests]
    steps:
      - run: echo "All CI checks passed!"
