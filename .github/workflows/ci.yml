name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.11"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Compute which kinds of files changed so heavy jobs can skip when
  # they're irrelevant (e.g. unit tests on a Dockerfile-only change).
  # Path-filter is fast (~5s); the savings on the heavy jobs are large.
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      python: ${{ steps.filter.outputs.python }}
      go: ${{ steps.filter.outputs.go }}
      docker: ${{ steps.filter.outputs.docker }}
      ci: ${{ steps.filter.outputs.ci }}
      schema: ${{ steps.filter.outputs.schema }}
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          # On `push` events to main/develop the action diffs against
          # the previous commit; on PRs it diffs against the base ref.
          # `pyproject.toml` is in every filter because it can change
          # what gets installed in any environment.
          filters: |
            python:
              - 'sdk/python/entdb_sdk/**'
              - 'tests/python/**'
              - 'pyproject.toml'
              - 'sdk/python/pyproject.toml'
              - '.github/workflows/ci.yml'
            go:
              - 'sdk/go/**'
              - 'server/go/**'
              - '.github/workflows/ci.yml'
            docker:
              - 'Dockerfile'
              - 'docker-compose*.yml'
              - 'tests/python/e2e/**'
              - 'pyproject.toml'
              - '.github/workflows/ci.yml'
            ci:
              - '.github/workflows/**'
            schema:
              - 'proto/entdb/v1/**.proto'
              - 'proto/console/v1/**.proto'
              - 'sdk/python/entdb_sdk/schema*'
              - '.schema-snapshot.json'
              - '.github/workflows/ci.yml'
            docs:
              - 'proto/entdb/v1/**.proto'
              - 'sdk/python/entdb_sdk/**'
              - 'sdk/go/entdb/**'
              - 'scripts/generate_api_docs.py'
              - 'scripts/check_docs_coverage.py'
              - 'docs/generated/**'
              - 'examples/**'
              - '.github/workflows/ci.yml'

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Run ruff
        run: uvx ruff@0.15.7 check .

      - name: Run ruff format check
        run: uvx ruff@0.15.7 format --check .

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.python == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - run: uv python install ${{ env.PYTHON_VERSION }}
      - run: |
          uv venv
          uv pip install -e ./sdk/python \
            "pytest>=8.0.0" "pytest-asyncio>=0.23.0" "pytest-cov>=4.1.0" \
            "pytest-timeout>=2.2.0" "ruff>=0.15.0" "httpx>=0.26.0" \
            "grpcio-tools>=1.60.0" pytest-xdist==3.5.0

      - name: Run unit tests (parallel)
        run: uv run pytest tests/python/unit -v -n auto --cov=entdb_sdk --cov-report=xml

      - uses: codecov/codecov-action@v6
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  # Integration suite — Python contract tests issued against the Go
  # ``entdb-server`` subprocess. The Python server was retired in Phase
  # 4D of EPIC #407, so this is the only integration-test path.
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.python == 'true' || needs.changes.outputs.go == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache-dependency-path: server/go/go.sum

      - name: Build Go entdb-server
        working-directory: server/go
        run: go build -o /tmp/entdb-server ./cmd/entdb-server

      - uses: astral-sh/setup-uv@v7
      - run: uv python install ${{ env.PYTHON_VERSION }}
      - run: |
          uv venv
          uv pip install -e ./sdk/python \
            "pytest>=8.0.0" "pytest-asyncio>=0.23.0" "pytest-cov>=4.1.0" \
            "pytest-timeout>=2.2.0" "httpx>=0.26.0" "grpcio-tools>=1.60.0"

      - name: Run integration suite against Go server
        env:
          ENTDB_GO_BINARY: /tmp/entdb-server
        run: uv run pytest tests/python/integration -v

  # Issue #40: docs are generated from code + examples are tested.
  #   1. regenerate docs/generated/ and fail if the checked-in copy is
  #      stale (proto / SDK changed but docs weren't regenerated);
  #   2. fail if any public RPC or SDK symbol is undocumented;
  #   3. run every examples/*.py end-to-end against the Go server so a
  #      breaking SDK/wire change trips here before a reader copies a
  #      stale snippet.
  docs-coverage:
    name: Docs Coverage & Examples
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.docs == 'true' || needs.changes.outputs.python == 'true' || needs.changes.outputs.go == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache-dependency-path: |
            server/go/go.sum
            sdk/go/entdb/go.sum

      - name: Build Go entdb-server (examples harness)
        working-directory: server/go
        run: go build -o /tmp/entdb-server ./cmd/entdb-server

      - uses: astral-sh/setup-uv@v7
      - run: uv python install ${{ env.PYTHON_VERSION }}
      - run: |
          uv venv
          uv pip install -e ./sdk/python \
            "pytest>=8.0.0" "pytest-asyncio>=0.23.0" \
            "pytest-timeout>=2.2.0" "grpcio-tools>=1.60.0"

      - name: Regenerate generated docs (Go surface included)
        run: uv run python scripts/generate_api_docs.py

      - name: Fail on stale generated docs
        run: |
          if ! git diff --exit-code -- docs/generated/; then
            echo "::error::docs/generated/ is stale — run 'python scripts/generate_api_docs.py' and commit the result"
            exit 1
          fi

      - name: Doc-coverage guard (every RPC + SDK symbol documented)
        run: uv run python scripts/check_docs_coverage.py

      - name: Run examples end-to-end against the Go server
        env:
          ENTDB_GO_BINARY: /tmp/entdb-server
        run: uv run pytest examples/ -p no:cacheprovider --timeout=120 -v

  schema-compat:
    name: Schema Compatibility Check
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.schema == 'true' || needs.changes.outputs.go == 'true'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # Always set up Go — we need it to build entdb-server (the live
      # registry source for `--from-server`). entdb-schema itself is
      # preferred from the released binary, but the source-build
      # fallback also needs Go, so we set it up unconditionally to keep
      # the YAML simple.
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache-dependency-path: server/go/go.sum

      # Prefer the released entdb-schema binary (issue #488 AC7). Fall
      # back to source-build when no release asset is found yet. See
      # the matching block in schema-compat.yml for rationale.
      - name: Install entdb-schema (from latest release, fallback to source)
        id: install
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/entdb-schema-bin
          ASSET="entdb-schema-*-linux-amd64.tar.gz"
          if gh release download --pattern "$ASSET" --dir /tmp/entdb-schema-bin --repo "$GITHUB_REPOSITORY" 2>/dev/null; then
            cd /tmp/entdb-schema-bin
            tar -xzf entdb-schema-*-linux-amd64.tar.gz
            chmod +x entdb-schema
            mv entdb-schema /tmp/entdb-schema
            /tmp/entdb-schema version
          else
            echo "::notice::No release asset found — falling back to build-from-source."
            (cd server/go && go build -o /tmp/entdb-schema ./cmd/entdb-schema)
          fi

      # Build entdb-server from this PR's tree so the registry we check
      # is the registry the PR actually ships. Mirrors the e2e/
      # integration jobs that boot the same binary the same way.
      - name: Build entdb-server (PR tree)
        working-directory: server/go
        run: go build -o /tmp/entdb-server ./cmd/entdb-server

      - name: Boot entdb-server and run schema check
        if: hashFiles('.schema-snapshot.json') != ''
        run: |
          set -euo pipefail
          DATA_DIR="$(mktemp -d)"
          LOG_FILE="$(mktemp)"
          # Boot in the background on a fixed loopback port; --wal-backend=memory
          # avoids needing a Kafka stack just to read the schema. The
          # --seed-profile=contract flag registers the User/Task/AssignedTo
          # registry that matches the committed .schema-snapshot.json
          # baseline (server/go/internal/testseed.RegisterContractSchema).
          /tmp/entdb-server \
            --addr 127.0.0.1:50451 \
            --data-dir "$DATA_DIR" \
            --wal-backend memory \
            --seed-profile contract \
            --seed-tenant acme \
            > "$LOG_FILE" 2>&1 &
          SERVER_PID=$!
          # Be sure to clean up even on early exit.
          trap 'kill "$SERVER_PID" 2>/dev/null || true; wait "$SERVER_PID" 2>/dev/null || true; echo "--- entdb-server log ---"; cat "$LOG_FILE" || true' EXIT

          # Readiness: poll the gRPC port via a TCP connect. The Python
          # conftest uses a Health RPC poll; for the CI step a TCP
          # connect is sufficient and avoids pulling in grpc tooling.
          for i in $(seq 1 60); do
            if (echo > /dev/tcp/127.0.0.1/50451) >/dev/null 2>&1; then
              echo "server ready after ${i} attempts"
              break
            fi
            sleep 0.5
            if ! kill -0 "$SERVER_PID" 2>/dev/null; then
              echo "::error::entdb-server exited during boot"
              exit 2
            fi
            if [ "$i" -eq 60 ]; then
              echo "::error::entdb-server did not become ready within 30s"
              exit 2
            fi
          done

          # Real check: compare the live server's schema against the
          # committed baseline. `check` exits 1 on breaking change, 0
          # otherwise, 2 on usage / I/O error.
          set +e
          /tmp/entdb-schema check \
            --baseline .schema-snapshot.json \
            --from-server 127.0.0.1:50451 \
            --format text
          status=$?
          set -e
          if [ "$status" -eq 1 ] && [[ "${{ contains(github.event.pull_request.labels.*.name, 'breaking-schema-change') }}" == "true" ]]; then
            echo "::warning::Breaking-schema-change label present — accepting on the labelled PR."
            exit 0
          fi
          exit "$status"

      - name: No baseline — recommend committing one
        if: hashFiles('.schema-snapshot.json') == ''
        run: |
          echo "No .schema-snapshot.json found at repo root."
          echo "Run 'entdb-schema snapshot --from-server <addr> > .schema-snapshot.json'"
          echo "to lock the current schema, then commit the file."

  go-server-build:
    name: Go Server Build
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.go == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache-dependency-path: server/go/go.sum

      - name: go vet
        working-directory: server/go
        run: go vet ./...

      - name: go test
        working-directory: server/go
        run: go test ./...

  # Go SDK: unit tests (vs the in-process fakeServer) PLUS the integration
  # suite, which builds + boots the real entdb-server and drives the SDK
  # against it over real gRPC — the Go mirror of the Python contract suite.
  # Without this, SDK changes were only ever checked against canned fakes.
  go-sdk:
    name: Go SDK
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.go == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache-dependency-path: |
            sdk/go/entdb/go.sum
            server/go/go.sum

      - name: go vet (SDK)
        working-directory: sdk/go/entdb
        run: go vet ./...

      - name: go test (SDK unit)
        working-directory: sdk/go/entdb
        run: go test ./...

      - name: go test (SDK integration vs real entdb-server)
        working-directory: sdk/go/entdb
        run: go test -tags=integration -run TestIntegration .

  # Drift guard for the checked-in Go server proto stubs. Regenerates
  # both surfaces (entdb.v1 + console.v1) from the .proto sources and
  # fails if the working tree differs from what's committed. Triggered
  # whenever Go server sources OR the wire protos change.
  go-server-proto-drift:
    name: Go Server Proto Drift Guard
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.go == 'true' || needs.changes.outputs.schema == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache-dependency-path: server/go/go.sum
      - uses: bufbuild/buf-setup-action@v1
        with:
          version: '1.66.0'

      - name: Regenerate server proto stubs
        run: |
          buf generate --template server/go/buf.gen.yaml
          buf generate --template server/go/buf.gen.console.yaml

      - name: Fail on drift
        run: |
          if ! git diff --exit-code -- server/go/internal/pb/; then
            echo "::error::server/go/internal/pb/ is out of date — run 'cd server/go && go generate ./...' and commit the result"
            exit 1
          fi

  docker-build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.docker == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          tags: ${{ env.IMAGE_NAME }}:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
          target: server

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [changes, docker-build]
    if: needs.changes.outputs.docker == 'true' || needs.changes.outputs.python == 'true' || needs.changes.outputs.go == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - run: |
          chmod +x tests/python/e2e/run-e2e.sh
          tests/python/e2e/run-e2e.sh --logs

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          ignore-unfixed: true

  # Aggregator job for branch protection. `if: always()` so it runs even
  # when upstream jobs were skipped by path filters; the script then
  # fails only if a non-skipped job didn't succeed. Skipped == OK.
  all-checks:
    name: All Checks Passed
    runs-on: ubuntu-latest
    if: always()
    needs: [lint, unit-tests, integration-tests, docs-coverage, schema-compat, go-server-build, go-sdk, go-server-proto-drift, docker-build, e2e-tests, security-scan]
    steps:
      - name: Verify required checks
        env:
          NEEDS: ${{ toJSON(needs) }}
        run: |
          set -euo pipefail
          echo "$NEEDS" | jq .
          if echo "$NEEDS" | jq -e 'to_entries | any(.value.result == "failure" or .value.result == "cancelled")' >/dev/null; then
            echo "::error::At least one upstream job failed or was cancelled"
            exit 1
          fi
          echo "All required checks passed (skipped checks counted as success)"
