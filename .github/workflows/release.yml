name: Release

on:
  push:
    tags: ['v*']

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  PYTHON_VERSION: "3.11"

jobs:
  # Build each (target × platform) on its native runner — no QEMU. Each
  # leg runs in parallel; wall-clock = max(slowest native build), not
  # max(slowest emulated build). Each leg builds, smoke-tests on its
  # native arch, and pushes the resulting image *by digest* (no tag).
  # The merge job then stitches the per-platform digests into a single
  # multi-arch manifest under the semver tags.
  build:
    name: Build (${{ matrix.target }}, ${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: server
            suffix: ""
            platform: linux/amd64
            arch: amd64
            runner: ubuntu-latest
          - target: server
            suffix: ""
            platform: linux/arm64
            arch: arm64
            runner: ubuntu-24.04-arm
          - target: sdk
            suffix: "-sdk"
            platform: linux/amd64
            arch: amd64
            runner: ubuntu-latest
          - target: sdk
            suffix: "-sdk"
            platform: linux/arm64
            arch: arm64
            runner: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v6

      - name: Inject version from git tag
        run: |
          VER="${GITHUB_REF_NAME#v}"
          echo "$VER" > VERSION
          echo "__version__ = \"$VER\"" > sdk/entdb_sdk/_version.py
          echo "__version__ = \"$VER\"" > dbaas/entdb_server/_version.py

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Stage 1: build a loadable single-platform image and run a real
      # smoke test on the same native runner. This catches startup-time
      # regressions (e.g. missing dep, broken import, broken CMD) and
      # arch-specific issues — each platform's smoke runs on its own
      # native arch, not under emulation.
      - name: Build (smoke, load only)
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: ${{ matrix.platform }}
          load: true
          push: false
          target: ${{ matrix.target }}
          tags: entdb-smoke:${{ matrix.target }}-${{ matrix.arch }}
          cache-from: type=gha,scope=${{ matrix.target }}-${{ matrix.arch }}
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT=${{ github.sha }}

      - name: Smoke test - server image boots and healthcheck reports SERVING
        if: matrix.target == 'server'
        run: |
          set -euo pipefail
          docker run -d --name entdb-smoke \
            -e WAL_BACKEND=local \
            -p 50051:50051 \
            entdb-smoke:server-${{ matrix.arch }}
          for i in $(seq 1 30); do
            if docker exec entdb-smoke \
                python -m dbaas.entdb_server.healthcheck --addr=localhost:50051; then
              echo "::notice::Server (${{ matrix.arch }}) healthy after ${i} attempts"
              docker rm -f entdb-smoke
              exit 0
            fi
            sleep 2
          done
          echo "::error::Server (${{ matrix.arch }}) did not become healthy within 60s"
          docker logs entdb-smoke
          docker rm -f entdb-smoke
          exit 1

      - name: Smoke test - SDK image imports entdb_sdk
        if: matrix.target == 'sdk'
        run: |
          set -euo pipefail
          docker run --rm entdb-smoke:sdk-${{ matrix.arch }} \
            python -c "import entdb_sdk; print('entdb_sdk', entdb_sdk.__version__, 'on ${{ matrix.arch }}')"

      # Stage 2: smoke passed — push the same image to the registry by
      # digest only (no tag). Buildkit reuses the cached layers from the
      # smoke build via the gha cache scope above.
      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          target: ${{ matrix.target }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}${{ matrix.suffix }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.target }}-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.target }}-${{ matrix.arch }}
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT=${{ github.sha }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest artifact
        uses: actions/upload-artifact@v7
        with:
          name: digest-${{ matrix.target }}-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # Combine the per-platform digests for each target into a single
  # multi-arch manifest list, applying the semver / latest / sha tags
  # from docker/metadata-action.
  merge:
    name: Merge multi-arch manifest (${{ matrix.target }})
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: server
            suffix: ""
          - target: sdk
            suffix: "-sdk"

    steps:
      - name: Download per-platform digests
        uses: actions/download-artifact@v8
        with:
          path: /tmp/digests
          pattern: digest-${{ matrix.target }}-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}${{ matrix.suffix }}
          tags: |
            # Semantic version from tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            # Latest for stable releases
            type=raw,value=latest,enable=${{ !contains(github.ref, '-') }}
            # SHA
            type=sha,prefix=sha-

      - name: Create and push multi-arch manifest
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}${{ matrix.suffix }}@sha256:%s ' *)

      - name: Inspect resulting manifest
        run: |
          docker buildx imagetools inspect \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}${{ matrix.suffix }}:${{ steps.meta.outputs.version }}

  publish-go-sdk:
    name: Publish Go SDK
    runs-on: ubuntu-latest
    needs: [merge]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.22'

      - name: Verify Go SDK builds
        working-directory: sdk/go/entdb
        run: |
          go vet ./...
          go test ./...
          go build ./...

      - name: Tag Go submodule
        run: |
          VER="${GITHUB_REF_NAME#v}"
          GO_TAG="sdk/go/entdb/v${VER}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git rev-parse "$GO_TAG" >/dev/null 2>&1; then
            echo "Go tag $GO_TAG already exists, skipping"
          else
            git tag -a "$GO_TAG" -m "Go SDK $GO_TAG"
            git push origin "$GO_TAG"
          fi

      - name: Trigger Go module proxy
        run: |
          VER="${GITHUB_REF_NAME#v}"
          MODULE="github.com/elloloop/tenant-shard-db/sdk/go/entdb"
          curl -fsSL "https://proxy.golang.org/${MODULE}/@v/v${VER}.info" || \
            echo "Module proxy will index within ~30 minutes"

  publish-pypi:
    name: Publish SDK to PyPI
    runs-on: ubuntu-latest
    needs: [merge]
    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Inject version from git tag
        run: |
          VER="${GITHUB_REF_NAME#v}"
          echo "$VER" > VERSION
          echo "__version__ = \"$VER\"" > sdk/entdb_sdk/_version.py

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build SDK package
        run: |
          cd sdk
          python -m build

      # Smoke-test the built wheel in a clean venv before publishing.
      # If the wheel can't be imported, refuse to push it to PyPI.
      - name: Smoke test - install wheel and import entdb_sdk
        run: |
          set -euo pipefail
          uv venv /tmp/sdk-smoke
          uv pip install --python /tmp/sdk-smoke/bin/python sdk/dist/*.whl
          /tmp/sdk-smoke/bin/python -c "
          import entdb_sdk
          from entdb_sdk import DbClient, register_proto_schema, Permission, Actor
          print('entdb_sdk', entdb_sdk.__version__)
          "

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: sdk/dist/

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [merge]
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          # Get commits since last tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            CHANGES=$(git log $PREV_TAG..HEAD --pretty=format:"- %s" --no-merges)
          else
            CHANGES=$(git log --pretty=format:"- %s" --no-merges -20)
          fi
          echo "CHANGES<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          body: |
            ## What's Changed
            ${{ steps.changelog.outputs.CHANGES }}

            ## Docker Images
            ```bash
            # Server
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}

            # SDK
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-sdk:${{ github.ref_name }}
            ```

            ## Python SDK
            ```bash
            pip install entdb-sdk==${{ github.ref_name }}
            ```
          draft: false
          prerelease: ${{ contains(github.ref, '-') }}
