name: Release

on:
  push:
    tags: ['v*']

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  PYTHON_VERSION: "3.11"

jobs:
  # Build each (target × platform) on its native runner — no QEMU. Each
  # leg runs in parallel; wall-clock = max(slowest native build), not
  # max(slowest emulated build). Each leg builds, smoke-tests on its
  # native arch, and pushes the resulting image *by digest* (no tag).
  # The merge job then stitches the per-platform digests into a single
  # multi-arch manifest under the semver tags.
  build:
    name: Build (${{ matrix.target }}, ${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          # server image is the Go reimplementation (Phase 4D of
          # EPIC #407 — Python server retired). Image name is
          # unchanged (ghcr.io/<repo>:vX.Y.Z) so downstream consumers
          # see a drop-in replacement. SQLCipher requires CGO, so each
          # arch leg builds on a native runner instead of cross-compiling.
          - target: server
            suffix: ""
            dockerfile: Dockerfile
            platform: linux/amd64
            arch: amd64
            runner: ubuntu-latest
          - target: server
            suffix: ""
            dockerfile: Dockerfile
            platform: linux/arm64
            arch: arm64
            runner: ubuntu-24.04-arm
          # entdb-schema is the standalone schema-snapshot CLI from
          # issue #488 (AC7). Distroless static image with just the
          # binary inside; same multi-arch story as the server. Image
          # name is ghcr.io/<repo>-schema:vX.Y.Z so it's a sibling
          # tag, not a subpath of the server image.
          - target: schema
            suffix: "-schema"
            dockerfile: Dockerfile.schema
            platform: linux/amd64
            arch: amd64
            runner: ubuntu-latest
          - target: schema
            suffix: "-schema"
            dockerfile: Dockerfile.schema
            platform: linux/arm64
            arch: arm64
            runner: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v4

      - name: Inject version from git tag
        run: |
          VER="${GITHUB_REF_NAME#v}"
          echo "$VER" > VERSION
          echo "__version__ = \"$VER\"" > sdk/python/entdb_sdk/_version.py

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Stage 1: build a loadable single-platform image and run a real
      # smoke test on the same native runner. This catches startup-time
      # regressions (e.g. missing dep, broken import, broken CMD) and
      # arch-specific issues — each platform's smoke runs on its own
      # native arch, not under emulation.
      - name: Build (smoke, load only)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platform }}
          load: true
          push: false
          target: ${{ matrix.target }}
          tags: entdb-smoke:${{ matrix.target }}-${{ matrix.arch }}
          cache-from: type=gha,scope=${{ matrix.target }}-${{ matrix.arch }}
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT=${{ github.sha }}

      # Smoke test for the Go server image. The image is distroless
      # (gcr.io/distroless/static-debian12:nonroot) so `docker exec`
      # against a shell or `python` is not an option — we probe the
      # listener from the host runner instead. A successful TCP
      # connect on :50051 confirms net.Listen returned without error
      # and the gRPC server is accepting connections, which is the
      # same liveness signal the old Python healthcheck gave us.
      - name: Smoke test - Go server image boots and listens on :50051
        if: matrix.target == 'server'
        run: |
          set -euo pipefail
          docker run -d --name entdb-smoke \
            -p 50051:50051 \
            entdb-smoke:server-${{ matrix.arch }}
          for i in $(seq 1 30); do
            if (echo > /dev/tcp/127.0.0.1/50051) >/dev/null 2>&1; then
              echo "::notice::Go server (${{ matrix.arch }}) listening after ${i} attempts"
              docker logs entdb-smoke | tail -20
              docker rm -f entdb-smoke
              exit 0
            fi
            sleep 2
          done
          echo "::error::Go server (${{ matrix.arch }}) did not start listening within 60s"
          docker logs entdb-smoke
          docker rm -f entdb-smoke
          exit 1

      # Smoke test for the entdb-schema image. Confirms the binary
      # is executable in the distroless runtime and that the embedded
      # subcommand dispatch is wired up (a broken main package would
      # exit non-zero on --help). We do not exercise --from-server
      # here — the image is build-time-only and has no network
      # dependency on a running server.
      - name: Smoke test - entdb-schema image runs --help
        if: matrix.target == 'schema'
        run: |
          set -euo pipefail
          docker run --rm entdb-smoke:schema-${{ matrix.arch }} --help \
            | grep -q "entdb-schema" || {
              echo "::error::entdb-schema --help did not print expected banner"
              exit 1
            }
          # The buf-breaking-style gate (ADR-032) must be wired — the
          # downstream CI step depends on this verb existing.
          docker run --rm entdb-smoke:schema-${{ matrix.arch }} --help \
            | grep -q "breaking" || {
              echo "::error::entdb-schema --help is missing the 'breaking' subcommand"
              exit 1
            }
          docker run --rm entdb-smoke:schema-${{ matrix.arch }} version

      # Stage 2: smoke passed — push the same image to the registry by
      # digest only (no tag). Buildkit reuses the cached layers from the
      # smoke build via the gha cache scope above.
      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platform }}
          push: true
          target: ${{ matrix.target }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}${{ matrix.suffix }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.target }}-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.target }}-${{ matrix.arch }}
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT=${{ github.sha }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest artifact
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.target }}-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # Combine the per-platform digests for each target into a single
  # multi-arch manifest list, applying the semver / latest / sha tags
  # from docker/metadata-action.
  merge:
    name: Merge multi-arch manifest (${{ matrix.target }})
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: read
      packages: write
      # OIDC for keyless cosign signing — no long-lived signing key
      # to rotate; the sigstore Fulcio CA mints a short-lived cert
      # bound to the workflow identity (repo + ref + workflow).
      id-token: write
      # Attestations API for SBOM + provenance.
      attestations: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: server
            suffix: ""
          - target: schema
            suffix: "-schema"

    steps:
      - name: Download per-platform digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digest-${{ matrix.target }}-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}${{ matrix.suffix }}
          tags: |
            # Semantic version from tag. docker/metadata-action strips
            # the leading "v" by default, so a git tag of v2.0.2 yields
            # an image tag of 2.0.2. We ALSO emit the v-prefixed form
            # so consumers who template `image: ...:${VERSION}` with
            # ${VERSION}=v2.0.2 (the git tag spelling — the natural
            # choice when bumping from a VERSION file or `git describe`)
            # don't hit a "manifest unknown" pull miss (issue #608).
            type=semver,pattern={{version}}
            type=semver,pattern=v{{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            # Latest for stable releases
            type=raw,value=latest,enable=${{ !contains(github.ref, '-') }}
            # SHA
            type=sha,prefix=sha-

      - name: Create and push multi-arch manifest
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}${{ matrix.suffix }}@sha256:%s ' *)

      - name: Inspect resulting manifest
        run: |
          docker buildx imagetools inspect \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}${{ matrix.suffix }}:${{ steps.meta.outputs.version }}

      # Resolve the manifest list to its content-addressable digest so
      # everything below pins the EXACT artifact we just pushed
      # (mutable tags can be re-pointed; digests cannot).
      - name: Resolve image digest
        id: digest
        run: |
          DIGEST=$(docker buildx imagetools inspect \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}${{ matrix.suffix }}:${{ steps.meta.outputs.version }} \
            --format '{{json .Manifest}}' | jq -r '.digest')
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"
          echo "Resolved digest: $DIGEST"

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      # Keyless signing (OIDC -> Fulcio short-lived cert). Verification:
      #   cosign verify ghcr.io/.../tenant-shard-db@<digest> \
      #     --certificate-identity-regexp '^https://github.com/elloloop/tenant-shard-db/' \
      #     --certificate-oidc-issuer https://token.actions.githubusercontent.com
      - name: Sign image with cosign (keyless)
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}${{ matrix.suffix }}@${{ steps.digest.outputs.digest }}
        run: cosign sign --yes "$IMAGE"

      - name: Generate SBOM (SPDX) with syft
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}${{ matrix.suffix }}@${{ steps.digest.outputs.digest }}
          format: spdx-json
          # Pin the artifact name to a deterministic value so the later
          # `attach-sboms-to-release` job can resolve it across both
          # matrix legs (server / schema). Without the override the
          # action embeds the digest in the artifact name, which the
          # downstream job can't predict.
          artifact-name: sbom-${{ matrix.target }}.spdx.json
          output-file: sbom-${{ matrix.target }}.spdx.json
          upload-artifact: true
          # NOTE: upload-release-assets is intentionally OFF here. The
          # `create-release` job runs AFTER `merge`, so at THIS point
          # the release doesn't exist yet and the action would silently
          # fall back to artifact-only. The dedicated
          # `attach-sboms-to-release` job below picks them up after
          # the release is created. v2.1.2 was patched manually; v2.1.3
          # is the first release where this lands automatically.
          upload-release-assets: false

      # GitHub-native build provenance — attaches a signed in-toto
      # SLSA-3 provenance attestation to the digest. Verifiable via
      # `gh attestation verify oci://<image>@<digest> --repo elloloop/tenant-shard-db`.
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}${{ matrix.suffix }}
          subject-digest: ${{ steps.digest.outputs.digest }}
          push-to-registry: true

  publish-go-sdk:
    name: Publish Go SDK
    runs-on: ubuntu-latest
    needs: [merge]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Verify Go SDK builds
        working-directory: sdk/go/entdb
        run: |
          go vet ./...
          go test ./...
          go build ./...

      - name: Tag Go submodule
        run: |
          VER="${GITHUB_REF_NAME#v}"
          GO_TAG="sdk/go/entdb/v${VER}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git rev-parse "$GO_TAG" >/dev/null 2>&1; then
            echo "Go tag $GO_TAG already exists, skipping"
          else
            git tag -a "$GO_TAG" -m "Go SDK $GO_TAG"
            git push origin "$GO_TAG"
          fi

      - name: Tag protoc-gen-entdb-keys submodule
        # The plugin is its own Go module (tools/protoc-gen-entdb-keys/go.mod);
        # Go's sub-module versioning requires `<path>/vX.Y.Z` tags, so we
        # mint one alongside the SDK tag. Without this, consumers
        # cannot `go install
        # github.com/elloloop/tenant-shard-db/tools/protoc-gen-entdb-keys/v2@vX.Y.Z`
        # — they have to build from a clone. Issue #602.
        run: |
          VER="${GITHUB_REF_NAME#v}"
          TOOL_TAG="tools/protoc-gen-entdb-keys/v${VER}"
          if git rev-parse "$TOOL_TAG" >/dev/null 2>&1; then
            echo "tools tag $TOOL_TAG already exists, skipping"
          else
            git tag -a "$TOOL_TAG" -m "protoc-gen-entdb-keys $TOOL_TAG"
            git push origin "$TOOL_TAG"
          fi

      - name: Trigger Go module proxy
        run: |
          VER="${GITHUB_REF_NAME#v}"
          MODULE="github.com/elloloop/tenant-shard-db/sdk/go/entdb/v2"
          curl -fsSL "https://proxy.golang.org/${MODULE}/@v/v${VER}.info" || \
            echo "Module proxy will index within ~30 minutes"
          # Warm the plugin module too so `go install` resolves promptly.
          TOOLS_MODULE="github.com/elloloop/tenant-shard-db/tools/protoc-gen-entdb-keys/v2"
          curl -fsSL "https://proxy.golang.org/${TOOLS_MODULE}/@v/v${VER}.info" || \
            echo "Tools module proxy will index within ~30 minutes"

  publish-pypi:
    name: Publish SDK to PyPI
    runs-on: ubuntu-latest
    needs: [merge]
    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Inject version from git tag
        run: |
          VER="${GITHUB_REF_NAME#v}"
          echo "$VER" > VERSION
          echo "__version__ = \"$VER\"" > sdk/python/entdb_sdk/_version.py

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build SDK package
        run: |
          cd sdk/python
          python -m build

      # Smoke-test the built wheel in a clean venv before publishing.
      # If the wheel can't be imported, refuse to push it to PyPI.
      - name: Smoke test - install wheel and import entdb_sdk
        run: |
          set -euo pipefail
          uv venv /tmp/sdk-smoke
          uv pip install --python /tmp/sdk-smoke/bin/python sdk/python/dist/*.whl
          /tmp/sdk-smoke/bin/python -c "
          import entdb_sdk
          from entdb_sdk import DbClient, register_proto_schema, Permission, Actor
          print('entdb_sdk', entdb_sdk.__version__)
          "

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: sdk/python/dist/

  build-cli-binaries:
    name: Build entdbctl release binaries
    runs-on: ubuntu-latest
    # Run after create-release so the GitHub Release exists by
    # the time goreleaser tries to attach assets to it (mode:
    # append in .goreleaser.yaml).
    needs: [create-release]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          workdir: sdk/go/entdb
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Cross-compile entdb-schema for every (OS × arch) we ship as a
  # downloadable release artifact, archive each, and attach to the
  # GitHub Release. Matches the issue #488 AC7 ask: the binary is
  # distributable as a release artifact and as a ghcr image (the
  # image is already produced by the matrix above; this job covers
  # the plain-archive path that the schema-compat CI workflow
  # consumes via `curl … releases/download/…`).
  #
  # Pure-Go binary — no CGO, no SQLite, no gRPC server runtime — so
  # cross-compilation is a flag swap. Build all platforms on a
  # single Linux runner.
  build-schema-binaries:
    name: Build entdb-schema release binaries
    runs-on: ubuntu-latest
    needs: [create-release]
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            archive: tar.gz
          - goos: linux
            goarch: arm64
            archive: tar.gz
          - goos: darwin
            goarch: amd64
            archive: tar.gz
          - goos: darwin
            goarch: arm64
            archive: tar.gz
          - goos: windows
            goarch: amd64
            archive: zip
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: server/go/go.sum

      - name: Build entdb-schema (${{ matrix.goos }}/${{ matrix.goarch }})
        working-directory: server/go
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          set -euo pipefail
          VER="${GITHUB_REF_NAME#v}"
          BIN_NAME="entdb-schema"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            BIN_NAME="entdb-schema.exe"
          fi
          mkdir -p /tmp/release-staging
          go build \
            -trimpath -ldflags="-s -w" \
            -o "/tmp/release-staging/${BIN_NAME}" \
            ./cmd/entdb-schema
          ls -lh "/tmp/release-staging/${BIN_NAME}"

      - name: Archive (${{ matrix.archive }})
        run: |
          set -euo pipefail
          ARCHIVE_BASE="entdb-schema-${GITHUB_REF_NAME}-${{ matrix.goos }}-${{ matrix.goarch }}"
          mkdir -p /tmp/release-out
          cd /tmp/release-staging
          if [ "${{ matrix.archive }}" = "zip" ]; then
            zip "/tmp/release-out/${ARCHIVE_BASE}.zip" *
          else
            tar -czf "/tmp/release-out/${ARCHIVE_BASE}.tar.gz" *
          fi
          # Per-archive SHA256 for users who verify downloads. The
          # checksum file lives next to the archive in the release.
          cd /tmp/release-out
          if command -v sha256sum >/dev/null; then
            sha256sum "${ARCHIVE_BASE}.${{ matrix.archive }}" \
              > "${ARCHIVE_BASE}.${{ matrix.archive }}.sha256"
          else
            shasum -a 256 "${ARCHIVE_BASE}.${{ matrix.archive }}" \
              > "${ARCHIVE_BASE}.${{ matrix.archive }}.sha256"
          fi
          ls -lh /tmp/release-out

      - name: Attach archive to GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            /tmp/release-out/entdb-schema-${{ github.ref_name }}-${{ matrix.goos }}-${{ matrix.goarch }}.${{ matrix.archive }}
            /tmp/release-out/entdb-schema-${{ github.ref_name }}-${{ matrix.goos }}-${{ matrix.goarch }}.${{ matrix.archive }}.sha256

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [merge]
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          # Get commits since last tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            CHANGES=$(git log $PREV_TAG..HEAD --pretty=format:"- %s" --no-merges)
          else
            CHANGES=$(git log --pretty=format:"- %s" --no-merges -20)
          fi
          echo "CHANGES<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          body: |
            ## What's Changed
            ${{ steps.changelog.outputs.CHANGES }}

            ## Docker Images
            ```bash
            # Server (Go reimplementation, multi-arch: linux/amd64 + linux/arm64)
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}

            # SDK (Python)
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-sdk:${{ github.ref_name }}

            # entdb-schema CLI (schema lockdown — issue #488)
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-schema:${{ github.ref_name }}
            ```

            ## Python SDK
            ```bash
            pip install entdb-sdk==${{ github.ref_name }}
            ```

            ## entdb-schema CLI
            Standalone schema-snapshot / check / diff binary for CI
            schema-lockdown (issue #488). Download for your platform:

            ```bash
            # Linux amd64
            curl -L -o entdb-schema.tar.gz \
              https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/entdb-schema-${{ github.ref_name }}-linux-amd64.tar.gz
            tar -xzf entdb-schema.tar.gz && chmod +x entdb-schema
            ```

            Other platforms: `linux-arm64`, `darwin-amd64`, `darwin-arm64`,
            `windows-amd64` (`.zip`). Or `go install
            github.com/elloloop/tenant-shard-db/server/go/cmd/entdb-schema@${{ github.ref_name }}`.
          draft: false
          prerelease: ${{ contains(github.ref, '-') }}

  # SBOMs are produced in the `merge` job (per-target: server + schema)
  # but at that point the GitHub Release doesn't exist yet, so the SBOM
  # action's `upload-release-assets: true` would silently fall back to
  # artifact-only. This job runs AFTER `create-release` and uploads the
  # already-generated artifacts as release assets — fixing the
  # ordering bug that surfaced in v2.1.2 (where SBOMs landed as
  # workflow artifacts only and had to be manually retrofitted).
  attach-sboms-to-release:
    name: Attach SBOMs to GitHub Release
    runs-on: ubuntu-latest
    needs: [merge, create-release]
    permissions:
      contents: write
    steps:
      - name: Download SBOM artifacts
        uses: actions/download-artifact@v4
        with:
          # Both matrix legs (server + schema) upload under their pinned
          # names; this fetches them into ./sboms/<name>/<name>.spdx.json.
          pattern: sbom-*.spdx.json
          path: sboms
          merge-multiple: false

      - name: Stage SBOMs with versioned filenames
        # The release-asset name carries the tag so consumers can pick
        # the right SBOM for the image digest they're running, matching
        # the entdb-schema / entdbctl asset naming convention on the
        # same release.
        run: |
          set -euo pipefail
          mkdir -p /tmp/sbom-assets
          for target in server schema; do
            src="sboms/sbom-${target}.spdx.json/sbom-${target}.spdx.json"
            if [ -f "$src" ]; then
              cp "$src" "/tmp/sbom-assets/sbom-${target}-${GITHUB_REF_NAME}.spdx.json"
            else
              echo "::warning::SBOM artifact for ${target} not found at ${src}"
            fi
          done
          ls -lh /tmp/sbom-assets

      - name: Upload SBOMs to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh release upload "$GITHUB_REF_NAME" \
            /tmp/sbom-assets/sbom-server-"$GITHUB_REF_NAME".spdx.json \
            /tmp/sbom-assets/sbom-schema-"$GITHUB_REF_NAME".spdx.json \
            --clobber
