name: Release

on:
  push:
    tags: ['v*']

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  PYTHON_VERSION: "3.11"

jobs:
  build-and-push:
    name: Build and Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - target: server
            suffix: ""
          - target: sdk
            suffix: "-sdk"

    steps:
      - uses: actions/checkout@v6

      - name: Inject version from git tag
        run: |
          VER="${GITHUB_REF_NAME#v}"
          echo "$VER" > VERSION
          echo "__version__ = \"$VER\"" > sdk/entdb_sdk/_version.py
          echo "__version__ = \"$VER\"" > dbaas/entdb_server/_version.py

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}${{ matrix.suffix }}
          tags: |
            # Semantic version from tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            # Latest for stable releases
            type=raw,value=latest,enable=${{ !contains(github.ref, '-') }}
            # SHA
            type=sha,prefix=sha-

      # Stage 1: build a single-arch image into the local docker daemon so
      # we can boot it and run a real smoke test BEFORE pushing anything
      # to the registry. This catches the "image fails at startup" class
      # of bug (e.g. missing runtime dep) that the multi-arch push step
      # cannot, since `load: true` is incompatible with multi-platform.
      - name: Build (smoke, linux/amd64, load only)
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          load: true
          push: false
          target: ${{ matrix.target }}
          tags: entdb-smoke:${{ matrix.target }}
          cache-from: type=gha
          # Don't write smoke build to cache — let the multi-arch push
          # step own the cache so its layers are reused.
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT=${{ github.sha }}

      - name: Smoke test - server image boots and healthcheck reports SERVING
        if: matrix.target == 'server'
        run: |
          set -euo pipefail
          docker run -d --name entdb-smoke \
            -e WAL_BACKEND=local \
            -p 50051:50051 \
            entdb-smoke:server
          # Poll the in-image healthcheck (the same one Docker / k8s use).
          # Wait up to 60s for the server to come up.
          for i in $(seq 1 30); do
            if docker exec entdb-smoke \
                python -m dbaas.entdb_server.healthcheck --addr=localhost:50051; then
              echo "::notice::Server healthy after ${i} attempts"
              docker rm -f entdb-smoke
              exit 0
            fi
            sleep 2
          done
          echo "::error::Server did not become healthy within 60s — refusing to publish image"
          docker logs entdb-smoke
          docker rm -f entdb-smoke
          exit 1

      - name: Smoke test - SDK image imports entdb_sdk
        if: matrix.target == 'sdk'
        run: |
          set -euo pipefail
          docker run --rm entdb-smoke:sdk \
            python -c "import entdb_sdk; print('entdb_sdk', entdb_sdk.__version__)"

      # Stage 2: smoke passed — now build the multi-arch image and push.
      # Buildkit reuses layers from the smoke build via gha cache.
      - name: Build and push (multi-arch)
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          target: ${{ matrix.target }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT=${{ github.sha }}

  publish-go-sdk:
    name: Publish Go SDK
    runs-on: ubuntu-latest
    needs: [build-and-push]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.22'

      - name: Verify Go SDK builds
        working-directory: sdk/go/entdb
        run: |
          go vet ./...
          go test ./...
          go build ./...

      - name: Tag Go submodule
        run: |
          VER="${GITHUB_REF_NAME#v}"
          GO_TAG="sdk/go/entdb/v${VER}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git rev-parse "$GO_TAG" >/dev/null 2>&1; then
            echo "Go tag $GO_TAG already exists, skipping"
          else
            git tag -a "$GO_TAG" -m "Go SDK $GO_TAG"
            git push origin "$GO_TAG"
          fi

      - name: Trigger Go module proxy
        run: |
          VER="${GITHUB_REF_NAME#v}"
          MODULE="github.com/elloloop/tenant-shard-db/sdk/go/entdb"
          curl -fsSL "https://proxy.golang.org/${MODULE}/@v/v${VER}.info" || \
            echo "Module proxy will index within ~30 minutes"

  publish-pypi:
    name: Publish SDK to PyPI
    runs-on: ubuntu-latest
    needs: [build-and-push]
    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Inject version from git tag
        run: |
          VER="${GITHUB_REF_NAME#v}"
          echo "$VER" > VERSION
          echo "__version__ = \"$VER\"" > sdk/entdb_sdk/_version.py

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build SDK package
        run: |
          cd sdk
          python -m build

      # Smoke-test the built wheel in a clean venv before publishing.
      # If the wheel can't be imported, refuse to push it to PyPI.
      - name: Smoke test - install wheel and import entdb_sdk
        run: |
          set -euo pipefail
          uv venv /tmp/sdk-smoke
          uv pip install --python /tmp/sdk-smoke/bin/python sdk/dist/*.whl
          /tmp/sdk-smoke/bin/python -c "
          import entdb_sdk
          from entdb_sdk import DbClient, register_proto_schema, Permission, Actor
          print('entdb_sdk', entdb_sdk.__version__)
          "

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: sdk/dist/

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-and-push]
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          # Get commits since last tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            CHANGES=$(git log $PREV_TAG..HEAD --pretty=format:"- %s" --no-merges)
          else
            CHANGES=$(git log --pretty=format:"- %s" --no-merges -20)
          fi
          echo "CHANGES<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          body: |
            ## What's Changed
            ${{ steps.changelog.outputs.CHANGES }}

            ## Docker Images
            ```bash
            # Server
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}

            # SDK
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-sdk:${{ github.ref_name }}
            ```

            ## Python SDK
            ```bash
            pip install entdb-sdk==${{ github.ref_name }}
            ```
          draft: false
          prerelease: ${{ contains(github.ref, '-') }}
