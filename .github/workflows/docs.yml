name: Deploy Documentation

on:
  push:
    branches: [main]
    paths:
      - 'docs-site/**'
      - 'docs/**'
      - 'scripts/generate_api_docs.py'
      - 'proto/entdb/v1/**.proto'
      - 'sdk/python/entdb_sdk/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: sdk/go/entdb/go.sum

      - uses: astral-sh/setup-uv@v4

      # Regenerate the machine-extracted API/SDK reference from the
      # proto + both SDK surfaces so the deployed site can never ship
      # a stale contract section. Source of truth is code, not the
      # checked-in markdown (issue #40 Layer 1).
      - name: Generate API docs from source
        run: |
          uv python install 3.11
          uv venv
          uv pip install -e ./sdk/python
          uv run python scripts/generate_api_docs.py

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        working-directory: docs-site
        run: pnpm install --frozen-lockfile || pnpm install

      - name: Build site
        working-directory: docs-site
        run: pnpm build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs-site/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
