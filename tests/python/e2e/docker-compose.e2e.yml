# =============================================================================
# EntDB E2E Test Environment — Go server target
# =============================================================================
#
# Parallel compose file to docker-compose.e2e.yml, with the Go server
# binary (Dockerfile.go) in place of the Python server. Wave 9 (EPIC #407)
# wires the Go server to Redpanda via the franz-go-backed Kafka WAL
# producer/consumer (see server/go/internal/wal/kafka.go), so this stack
# now mirrors the Python e2e topology: Redpanda + persistent SQLite data
# volume so docker compose restart can replay the WAL and rebuild
# SQLite, exercising the test_recovery_after_restart invariant.
#
# Usage:
#   ENTDB_SERVER_TARGET=go tests/python/e2e/run-e2e.sh --logs
#
# =============================================================================

services:
  tls-certs:
    image: alpine:3.20
    command:
      - sh
      - -c
      - |
        set -euo pipefail
        apk add --no-cache openssl
        mkdir -p /tls
        if [ ! -s /tls/ca.pem ] || [ ! -s /tls/server.pem ] || [ ! -s /tls/server-key.pem ]; then
          openssl ecparam -genkey -name prime256v1 -noout -out /tls/ca-key.pem
          openssl req -x509 -new -nodes -key /tls/ca-key.pem -sha256 -days 2 \
            -subj "/CN=entdb-e2e-ca" \
            -addext "basicConstraints=critical,CA:TRUE,pathlen:0" \
            -addext "keyUsage=critical,keyCertSign,cRLSign" \
            -out /tls/ca.pem
          openssl ecparam -genkey -name prime256v1 -noout -out /tls/server-key.pem
          openssl req -new -key /tls/server-key.pem \
            -subj "/CN=server" \
            -out /tls/server.csr
          printf "subjectAltName=DNS:server,DNS:localhost,IP:127.0.0.1\nextendedKeyUsage=serverAuth\nkeyUsage=digitalSignature\n" > /tls/server.ext
          openssl x509 -req -in /tls/server.csr -CA /tls/ca.pem -CAkey /tls/ca-key.pem -CAcreateserial \
            -out /tls/server.pem -days 2 -sha256 -extfile /tls/server.ext
        fi
        chown -R 65532:65532 /tls
        chmod 0444 /tls/*.pem
    volumes:
      - tls-certs:/tls

  # ==========================================================================
  # Redpanda (Kafka-compatible WAL backend)
  #
  # Identical configuration to docker-compose.e2e.yml so the Python and
  # Go targets exercise the same broker behaviour. Auto-topic creation
  # is on (default), so we do not need a topic-init sidecar.
  # ==========================================================================
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v23.3.5
    command:
      - redpanda
      - start
      - --smp=1
      - --memory=256M
      - --reserve-memory=0M
      - --overprovisioned
      - --node-id=0
      - --kafka-addr=PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://redpanda:9092
    healthcheck:
      test: ["CMD", "rpk", "cluster", "health"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

  # ==========================================================================
  # EntDB Server (Go binary)
  #
  # `--seed-profile=e2e --seed-tenant=e2e-test` pre-creates the tenant,
  # the `user:e2e-runner` actor (tenant owner), and the User/Product/
  # Order schema (typeIDs 8001/8002/8003) the e2e suite expects.
  #
  # --wal-backend=kafka points the WAL at Redpanda. The applier consumer
  # group rejoins on restart and replays from the committed offset (or
  # earliest, the first time), which is what test_recovery_after_restart
  # depends on.
  #
  # The data-dir is volumised so SQLite survives `docker compose
  # restart`. Without this the WAL replays cleanly but the rebuilt
  # SQLite is empty until every event has been re-applied; the test
  # then races the applier and may flake. Volumising matches the
  # production deployment pattern (SQLite as a fast read-side cache of
  # the WAL).
  # ==========================================================================
  server:
    build:
      context: ../../..
      dockerfile: Dockerfile
      target: server
    image: entdb-server-go:test
    command:
      - "-addr=:50051"
      - "-data-dir=/var/lib/entdb"
      - "-wal-backend=kafka"
      - "-wal-brokers=redpanda:9092"
      - "-wal-topic=entdb-wal-e2e"
      - "-wal-group=entdb-applier-e2e"
      - "-seed-profile=e2e"
      - "-seed-tenant=e2e-test"
      - "-tls-cert=/etc/entdb/tls/server.pem"
      - "-tls-key=/etc/entdb/tls/server-key.pem"
      - "-tls-ca=/etc/entdb/tls/ca.pem"
      - "-require-tls=true"
    depends_on:
      tls-certs:
        condition: service_completed_successfully
      redpanda:
        condition: service_healthy
    volumes:
      - go-server-data:/var/lib/entdb
      - tls-certs:/etc/entdb/tls:ro
    # No HEALTHCHECK in the distroless image (no shell, no grpc probe
    # binary baked in). The test runner retries its own connect with
    # MAX_RETRIES so a TCP-ready server is sufficient.

  # ==========================================================================
  # E2E Test Runner — identical to the Python-target stack except for
  # the compose file path and the SERVER_TARGET env. The /var/run
  # bind mount + /compose mount let the crash-recovery test run
  # `docker compose restart server` from inside the container.
  # ==========================================================================
  e2e-tests:
    build:
      context: ../../..
      dockerfile: tests/python/e2e/Dockerfile.e2e
    environment:
      - ENTDB_HOST=server
      - ENTDB_PORT=50051
      - ENTDB_TENANT=e2e-test
      - ENTDB_SERVER_TARGET=go
      - ENTDB_TLS_CA=/etc/entdb/tls/ca.pem
      - COMPOSE_PROJECT_NAME=e2e-go
    depends_on:
      - server
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./docker-compose.e2e.yml:/compose/docker-compose.yml:ro
      - tls-certs:/etc/entdb/tls:ro

volumes:
  go-server-data:
  tls-certs:

networks:
  default:
    name: entdb-e2e-go-network
