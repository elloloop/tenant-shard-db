// EntDB Schema Options — v2
//
// Import this in your schema .proto files to annotate messages
// as EntDB node types and edge types, with full support for
// data classification, GDPR compliance, ACL defaults, and edge policies.
//
// Example:
//   import "entdb_options.proto";
//
//   message User {
//       option (entdb.node).type_id = 1;
//       option (entdb.node).data_policy = DATA_POLICY_PERSONAL;
//       option (entdb.node).subject_field = "id";
//
//       string email = 1 [(entdb.field) = { required: true, pii: true }];
//       string name  = 2 [(entdb.field) = { required: true, pii: true, searchable: true }];
//   }

syntax = "proto3";

package entdb;

import "google/protobuf/descriptor.proto";

// Data classification for GDPR compliance
enum DataPolicy {
    DATA_POLICY_PERSONAL = 0;    // user's own data, fully exportable, DELETE on exit
    DATA_POLICY_BUSINESS = 1;    // business data, contributions exportable, ANONYMIZE on exit
    DATA_POLICY_FINANCIAL = 2;   // legal retention required, RETAIN + ANONYMIZE PII
    DATA_POLICY_AUDIT = 3;       // security logs, not user-exportable, RETAIN + ANONYMIZE PII
    DATA_POLICY_EPHEMERAL = 4;   // temporary, not exportable, DELETE on exit
    DATA_POLICY_HEALTHCARE = 5;  // PHI, field-level encryption, 6yr retention
}

// What happens to edges when referenced user exits
enum SubjectExitPolicy {
    SUBJECT_EXIT_BOTH = 0;   // act on edges in both directions
    SUBJECT_EXIT_FROM = 1;   // only when user is the source (from)
    SUBJECT_EXIT_TO = 2;     // only when user is the target (to)
}

// Universal, built-in capabilities shipped with EntDB. These are
// checked by the ACL engine for every typed operation. User-defined
// extension capabilities live in per-type enums declared via the
// ``extension_capability_enum`` NodeOpts field below.
enum CoreCapability {
    CORE_CAP_UNSPECIFIED = 0;
    CORE_CAP_READ = 1;
    CORE_CAP_COMMENT = 2;
    CORE_CAP_EDIT = 3;
    CORE_CAP_DELETE = 4;
    CORE_CAP_ADMIN = 5;
}

// Mapping from a server op (optionally narrowed by field / field_value
// / child_type) to the capability required to perform it on a given
// node type. If ``required_core`` is set, ``required_ext`` must be 0
// (unset) and vice versa.
message CapabilityMapping {
    string op = 1;                    // e.g. "UpdateNode", "CreateChild"
    string field = 2;                 // optional field filter
    string field_value = 3;           // optional field-value filter
    string child_type = 4;            // optional child-type filter
    CoreCapability required_core = 5; // one-of with required_ext
    int32 required_ext = 6;           // enum value from extension_capability_enum
}

// Declares that holding ``core``/``ext`` implies all of the
// capabilities listed in ``implies_core``/``implies_ext``. Merged with
// the built-in ADMIN > EDIT > COMMENT > READ hierarchy.
message CapabilityImplication {
    CoreCapability core = 1;          // one-of with ext
    int32 ext = 2;
    repeated CoreCapability implies_core = 3;
    repeated int32 implies_ext = 4;
}

// Node type configuration — applied to a message
message NodeOpts {
    int32 type_id = 1;                    // stable numeric ID (required)

    // ACL defaults
    bool public = 2;                      // world-readable
    bool tenant_visible = 3;             // visible to all tenant members
    bool inherit = 4;                     // inherit ACL from structural parent
    bool private = 5;                     // owner-only (mutually exclusive with inherit)

    // GDPR
    DataPolicy data_policy = 6;           // data classification
    string subject_field = 7;             // field that identifies who data is ABOUT
    int32 retention_days = 8;             // legal retention period (0 = none)
    string legal_basis = 9;              // documented justification for retention

    // Metadata
    string description = 10;
    bool deprecated = 11;

    // Typed capability system (2026-04-13 ACL decision)
    //
    // Name of the user-defined extension enum (e.g. "TaskExtCapability")
    // that declares per-type capabilities beyond the universal
    // ``CoreCapability`` enum. Leave empty if the type only uses core
    // capabilities.
    string extension_capability_enum = 20;

    // Explicit op → capability mappings. Overrides the server's
    // default ``GetNode → READ`` / ``UpdateNode → EDIT`` table for
    // this specific type. Field-level entries (e.g. ``UpdateNode`` on
    // ``status``) take precedence over type-wide entries.
    repeated CapabilityMapping capability_mappings = 21;

    // Per-type implication hierarchy merged with the built-in
    // ADMIN > EDIT > COMMENT > READ closure.
    repeated CapabilityImplication capability_implications = 22;

    // Field 23 (``repeated NodeKeySpec keys``) is retired as of the
    // 2026-04-14 SDK v0.3 decision. Single-field unique constraints
    // are now declared at the field site via
    // ``(entdb.field).unique = true``. Composite (multi-field)
    // uniqueness lives in ``composite_unique`` (tag 24) below.
    reserved 23;
    reserved "keys";

    // Composite (multi-field) unique constraints. Each entry declares
    // that the listed proto fields, taken as a tuple, must be unique
    // across all nodes of this type. Server resolves names to
    // ``field_id`` at registration time and creates a unique
    // expression index covering the tuple. Single-field uniqueness
    // continues to use ``(entdb.field).unique = true``.
    repeated UniqueConstraint composite_unique = 24;
}

// Composite uniqueness constraint on a node type — declares that the
// listed fields, taken together as a tuple, must be unique across all
// nodes of the type. Equivalent to a Postgres
// ``CREATE UNIQUE INDEX ON nodes_<type> (field_a, field_b, ...)``.
//
// Example::
//
//     message OAuthIdentity {
//         option (entdb.node).type_id = 201;
//         option (entdb.node).composite_unique = {
//             name: "provider_user_id",
//             fields: ["provider", "provider_user_id"]
//         };
//
//         string provider = 1 [(entdb.field) = { required: true }];
//         string provider_user_id = 2 [(entdb.field) = { required: true }];
//     }
//
// Server resolves ``fields`` (proto field names) to the stable
// ``field_id`` values via the schema registry and creates a unique
// expression index on the ``nodes`` table covering the tuple.
message UniqueConstraint {
    // Proto field names that participate in the constraint. The server
    // resolves each to a numeric ``field_id`` at registration time.
    // Must reference at least 2 fields (single-field uniqueness is
    // declared via ``(entdb.field).unique = true``).
    repeated string fields = 1;
    // Optional human-readable name. When omitted, the server derives a
    // stable name from the field ids (e.g. ``f1_f2``). Used in error
    // messages and SQLite index names.
    string name = 2;
}

// Edge type configuration — applied to a message representing an edge
message EdgeOpts {
    int32 edge_id = 1;                    // stable numeric ID
    string name = 2;                      // human-readable name

    // Behavior
    bool propagate_share = 3;             // sharing source shares target
    bool unique_per_from = 4;             // at most one edge per source

    // GDPR
    DataPolicy data_policy = 5;
    SubjectExitPolicy on_subject_exit = 6; // what happens when ref'd user exits
    int32 retention_days = 7;
    string legal_basis = 8;

    // Metadata
    string description = 9;
    bool deprecated = 10;
}

// Field-level options — applied to individual fields
message FieldOpts {
    bool required = 1;
    bool searchable = 2;
    bool indexed = 3;

    // PII/PHI tracking
    bool pii = 4;                         // personally identifiable (scrubbed on anonymize)
    bool phi = 5;                         // protected health info (field-level encryption)

    // Type hints
    string enum_values = 6;               // comma-separated for string enums
    string kind = 7;                      // override: "timestamp", "json", "ref", etc.
    int32 ref_type_id = 8;               // reference target type_id

    // Metadata
    string default_value = 9;
    string description = 10;
    bool deprecated = 11;

    // Explicit non-PII declaration (silences lint warning)
    bool pii_false = 12;                  // explicitly declared as NOT PII

    // Unique constraint declaration (2026-04-14 SDK v0.3 decision).
    // When ``true`` the server lazily creates a unique expression
    // index on ``nodes(tenant_id, json_extract(payload_json,
    // '$."<field_id>"'))`` (partial index ``WHERE type_id =
    // <type_id>``) the first time a node of this type is written.
    // Duplicate inserts surface as ``ALREADY_EXISTS``.
    bool unique = 13;
}

// Extensions — attach EntDB options to standard proto descriptors

extend google.protobuf.MessageOptions {
    // Mark a message as an EntDB node type
    NodeOpts node = 50100;

    // Mark a message as an EntDB edge type (fields become edge props)
    EdgeOpts edge = 50101;
}

extend google.protobuf.FieldOptions {
    // EntDB field-level options
    FieldOpts field = 50102;
}
