// EntDB gRPC Service Definition
//
// This file defines the gRPC API for the EntDB database service.
// The API supports node/edge graph operations with tenant isolation.
//
// Key concepts:
// - Every operation requires tenant_id and actor
// - Writes are atomic via ExecuteAtomic RPC
// - Reads are eventually consistent from SQLite views
//
// Compatibility rules:
// - Field numbers are immutable
// - New fields should be optional
// - Deprecated fields should be marked but kept

syntax = "proto3";

package entdb.v1;

import "google/protobuf/struct.proto";

option go_package = "github.com/example/entdb/proto/v1";

// EntDB Service - Main API for database operations
service EntDBService {
    // Execute an atomic transaction containing one or more operations
    // Returns a receipt that can be used to check application status
    rpc ExecuteAtomic(ExecuteAtomicRequest) returns (ExecuteAtomicResponse);

    // Get the status of a previously submitted transaction
    rpc GetReceiptStatus(GetReceiptStatusRequest) returns (GetReceiptStatusResponse);

    // Get a node by ID
    rpc GetNode(GetNodeRequest) returns (GetNodeResponse);

    // Get multiple nodes by IDs
    rpc GetNodes(GetNodesRequest) returns (GetNodesResponse);

    // Query nodes by type with optional filters
    rpc QueryNodes(QueryNodesRequest) returns (QueryNodesResponse);

    // Get outgoing edges from a node
    rpc GetEdgesFrom(GetEdgesRequest) returns (GetEdgesResponse);

    // Get incoming edges to a node
    rpc GetEdgesTo(GetEdgesRequest) returns (GetEdgesResponse);

    // Search mailbox with full-text search
    rpc SearchMailbox(SearchMailboxRequest) returns (SearchMailboxResponse);

    // Get mailbox items for a user
    rpc GetMailbox(GetMailboxRequest) returns (GetMailboxResponse);

    // Get server health and status
    rpc Health(HealthRequest) returns (HealthResponse);

    // Get schema information
    rpc GetSchema(GetSchemaRequest) returns (GetSchemaResponse);

    // List all tenants that have data
    rpc ListTenants(ListTenantsRequest) returns (ListTenantsResponse);

    // List mailbox users for a tenant
    rpc ListMailboxUsers(ListMailboxUsersRequest) returns (ListMailboxUsersResponse);

    // Wait for a specific stream position to be applied
    rpc WaitForOffset(WaitForOffsetRequest) returns (WaitForOffsetResponse);

    // ACL v2 - Get connected nodes with ACL filtering
    rpc GetConnectedNodes(GetConnectedNodesRequest) returns (GetConnectedNodesResponse);

    // ACL v2 - Share a node with an actor
    rpc ShareNode(ShareNodeRequest) returns (ShareNodeResponse);

    // ACL v2 - Revoke access from an actor
    rpc RevokeAccess(RevokeAccessRequest) returns (RevokeAccessResponse);

    // ACL v2 - List nodes shared with the caller
    rpc ListSharedWithMe(ListSharedWithMeRequest) returns (ListSharedWithMeResponse);

    // ACL v2 - Add a member to a group
    rpc AddGroupMember(GroupMemberRequest) returns (GroupMemberResponse);

    // ACL v2 - Remove a member from a group
    rpc RemoveGroupMember(GroupMemberRequest) returns (GroupMemberResponse);

    // ACL v2 - Transfer ownership of a node
    rpc TransferOwnership(TransferOwnershipRequest) returns (TransferOwnershipResponse);

    // User registry CRUD
    rpc CreateUser(CreateUserRequest) returns (CreateUserResponse);
    rpc GetUser(GetUserRequest) returns (GetUserResponse);
    rpc UpdateUser(UpdateUserRequest) returns (UpdateUserResponse);
    rpc ListUsers(ListUsersRequest) returns (ListUsersResponse);

    // Tenant registry CRUD
    rpc CreateTenant(CreateTenantRequest) returns (CreateTenantResponse);
    rpc GetTenant(GetTenantRequest) returns (GetTenantResponse);
    rpc ArchiveTenant(ArchiveTenantRequest) returns (ArchiveTenantResponse);

    // Tenant membership management
    rpc AddTenantMember(TenantMemberRequest) returns (TenantMemberResponse);
    rpc RemoveTenantMember(TenantMemberRequest) returns (TenantMemberResponse);
    rpc GetTenantMembers(GetTenantMembersRequest) returns (GetTenantMembersResponse);
    rpc GetUserTenants(GetUserTenantsRequest) returns (GetUserTenantsResponse);
    rpc ChangeMemberRole(ChangeMemberRoleRequest) returns (ChangeMemberRoleResponse);
}

// Common message types

message RequestContext {
    // Tenant identifier (required)
    string tenant_id = 1;

    // Actor performing the operation (required)
    // Format: "user:ID", "system:NAME", etc.
    string actor = 2;

    // Optional trace ID for distributed tracing
    string trace_id = 3;
}

message Receipt {
    // Tenant identifier
    string tenant_id = 1;

    // Idempotency key for the transaction
    string idempotency_key = 2;

    // Stream position where the event was written
    string stream_position = 3;
}

// Execute Atomic - Write operations

message ExecuteAtomicRequest {
    // Request context (required)
    RequestContext context = 1;

    // Idempotency key (optional, generated if not provided)
    string idempotency_key = 2;

    // Schema fingerprint for validation
    string schema_fingerprint = 3;

    // List of operations to execute atomically
    repeated Operation operations = 4;

    // Whether to wait for the event to be applied before returning
    bool wait_applied = 5;

    // Timeout for wait_applied in milliseconds
    int32 wait_timeout_ms = 6;
}

message Operation {
    oneof op {
        CreateNodeOp create_node = 1;
        UpdateNodeOp update_node = 2;
        DeleteNodeOp delete_node = 3;
        CreateEdgeOp create_edge = 4;
        DeleteEdgeOp delete_edge = 5;
    }
}

message CreateNodeOp {
    // Node type ID (required)
    int32 type_id = 1;

    // Node ID (optional, generated if not provided)
    string id = 2;

    // Reserved: old JSON string fields
    reserved 3, 4;
    reserved "data_json", "acl_json";

    // Alias for referencing this node in subsequent operations
    string as = 5;

    // Users to fanout this node to
    repeated string fanout_to = 6;

    // Payload as typed Struct
    google.protobuf.Struct data = 7;

    // ACL entries
    repeated AclEntry acl = 8;
}

message UpdateNodeOp {
    // Node type ID (required for validation)
    int32 type_id = 1;

    // Node ID or reference (required)
    string id = 2;

    // Reserved: old JSON string field
    reserved 3;
    reserved "patch_json";

    // Field mask for partial updates
    repeated string field_mask = 4;

    // Patch payload as typed Struct
    google.protobuf.Struct patch = 5;
}

message DeleteNodeOp {
    // Node type ID
    int32 type_id = 1;

    // Node ID (required)
    string id = 2;
}

message CreateEdgeOp {
    // Edge type ID (required)
    int32 edge_id = 1;

    // Source node reference
    NodeRef from = 2;

    // Target node reference
    NodeRef to = 3;

    // Reserved: old JSON string field
    reserved 4;
    reserved "props_json";

    // Edge properties as typed Struct
    google.protobuf.Struct props = 5;
}

message DeleteEdgeOp {
    // Edge type ID (required)
    int32 edge_id = 1;

    // Source node reference
    NodeRef from = 2;

    // Target node reference
    NodeRef to = 3;
}

message NodeRef {
    oneof ref {
        // Direct node ID
        string id = 1;

        // Reference to aliased node (e.g., "$task.id")
        string alias_ref = 2;

        // Type ID + node ID
        TypedNodeRef typed = 3;
    }
}

message TypedNodeRef {
    int32 type_id = 1;
    string id = 2;
}

message ExecuteAtomicResponse {
    // Whether the operation succeeded
    bool success = 1;

    // Receipt for tracking (present on success)
    Receipt receipt = 2;

    // Error message (present on failure)
    string error = 3;

    // Error code for programmatic handling
    string error_code = 4;

    // IDs of created nodes (in order of operations)
    repeated string created_node_ids = 5;

    // Application status (if wait_applied was true)
    ReceiptStatus applied_status = 6;
}

// Receipt Status

message GetReceiptStatusRequest {
    RequestContext context = 1;
    string idempotency_key = 2;
}

message GetReceiptStatusResponse {
    ReceiptStatus status = 1;
    string error = 2;
}

enum ReceiptStatus {
    RECEIPT_STATUS_UNKNOWN = 0;
    RECEIPT_STATUS_PENDING = 1;
    RECEIPT_STATUS_APPLIED = 2;
    RECEIPT_STATUS_FAILED = 3;
}

// Read operations

message GetNodeRequest {
    RequestContext context = 1;
    int32 type_id = 2;
    string node_id = 3;

    // Wait for this stream position to be applied before reading
    string after_offset = 10;
    int32 wait_timeout_ms = 11;
}

message GetNodeResponse {
    Node node = 1;
    bool found = 2;
}

message GetNodesRequest {
    RequestContext context = 1;
    int32 type_id = 2;
    repeated string node_ids = 3;

    // Wait for this stream position to be applied before reading
    string after_offset = 10;
    int32 wait_timeout_ms = 11;
}

message GetNodesResponse {
    repeated Node nodes = 1;
    repeated string missing_ids = 2;
}

message QueryNodesRequest {
    RequestContext context = 1;
    int32 type_id = 2;

    // Reserved: old JSON string field
    reserved 3;
    reserved "filter_json";

    // Pagination
    int32 limit = 4;
    int32 offset = 5;

    // Sort order
    string order_by = 6;
    bool descending = 7;

    // Typed filter conditions
    repeated FieldFilter filters = 8;

    // Wait for this stream position to be applied before reading
    string after_offset = 10;
    int32 wait_timeout_ms = 11;
}

message QueryNodesResponse {
    repeated Node nodes = 1;
    int32 total_count = 2;
    bool has_more = 3;
}

message Node {
    string tenant_id = 1;
    string node_id = 2;
    int32 type_id = 3;

    // Reserved: old JSON string fields
    reserved 4, 8;
    reserved "payload_json", "acl_json";

    int64 created_at = 5;
    int64 updated_at = 6;
    string owner_actor = 7;

    // Payload as typed Struct
    google.protobuf.Struct payload = 9;

    // ACL entries
    repeated AclEntry acl = 10;
}

// Edge operations

message GetEdgesRequest {
    RequestContext context = 1;
    string node_id = 2;

    // Optional edge type filter
    int32 edge_type_id = 3;

    // Pagination
    int32 limit = 4;
    int32 offset = 5;
}

message GetEdgesResponse {
    repeated Edge edges = 1;
    bool has_more = 2;
}

message Edge {
    string tenant_id = 1;
    int32 edge_type_id = 2;
    string from_node_id = 3;
    string to_node_id = 4;

    // Reserved: old JSON string field
    reserved 5;
    reserved "props_json";

    int64 created_at = 6;

    // Edge properties as typed Struct
    google.protobuf.Struct props = 7;
}

// Mailbox operations

message SearchMailboxRequest {
    RequestContext context = 1;

    // User whose mailbox to search
    string user_id = 2;

    // Search query
    string query = 3;

    // Optional type filter
    repeated int32 source_type_ids = 4;

    // Pagination
    int32 limit = 5;
    int32 offset = 6;
}

message SearchMailboxResponse {
    repeated MailboxSearchResult results = 1;
    bool has_more = 2;
}

message MailboxSearchResult {
    MailboxItem item = 1;
    float rank = 2;
    string highlights = 3;
}

message GetMailboxRequest {
    RequestContext context = 1;
    string user_id = 2;

    // Filters
    int32 source_type_id = 3;
    string thread_id = 4;
    bool unread_only = 5;

    // Pagination
    int32 limit = 6;
    int32 offset = 7;
}

message GetMailboxResponse {
    repeated MailboxItem items = 1;
    int32 unread_count = 2;
    bool has_more = 3;
}

message MailboxItem {
    string item_id = 1;
    string ref_id = 2;
    int32 source_type_id = 3;
    string source_node_id = 4;
    string thread_id = 5;
    int64 ts = 6;

    // Reserved: old JSON string fields
    reserved 7, 9;
    reserved "state_json", "metadata_json";

    string snippet = 8;

    // State as typed Struct
    google.protobuf.Struct state = 10;

    // Metadata as typed Struct
    google.protobuf.Struct metadata = 11;
}

// Health and Schema

message HealthRequest {}

message HealthResponse {
    bool healthy = 1;
    string version = 2;
    map<string, string> components = 3;
}

message GetSchemaRequest {
    // Optional: get schema for specific type
    int32 type_id = 1;

    // Optional: tenant ID for observed schema fallback
    string tenant_id = 2;
}

message GetSchemaResponse {
    // Reserved: old JSON string field
    reserved 1;
    reserved "schema_json";

    string fingerprint = 2;

    // Schema as typed Struct
    google.protobuf.Struct schema = 3;
}

// Tenant listing

message ListTenantsRequest {}

message ListTenantsResponse {
    repeated TenantInfo tenants = 1;
}

message TenantInfo {
    string tenant_id = 1;
}

// Mailbox user listing

message ListMailboxUsersRequest {
    string tenant_id = 1;
}

message ListMailboxUsersResponse {
    repeated string user_ids = 1;
}

// ACL and filter types

message AclEntry {
    string principal = 1;
    string permission = 2;
}

message FieldFilter {
    string field = 1;
    FilterOp op = 2;
    google.protobuf.Value value = 3;
}

enum FilterOp {
    EQ = 0;
    NEQ = 1;
    GT = 2;
    GTE = 3;
    LT = 4;
    LTE = 5;
    CONTAINS = 6;
    IN = 7;
}

// Wait for offset - read-after-write consistency

message WaitForOffsetRequest {
    RequestContext context = 1;
    string stream_position = 2;
    int32 timeout_ms = 3;
}

message WaitForOffsetResponse {
    bool reached = 1;
    string current_position = 2;
}

// ACL v2 messages

message GetConnectedNodesRequest {
    RequestContext context = 1;
    string node_id = 2;
    int32 edge_type_id = 3;
    int32 limit = 4;
    int32 offset = 5;
}

message GetConnectedNodesResponse {
    repeated Node nodes = 1;
    bool has_more = 2;
}

message ShareNodeRequest {
    RequestContext context = 1;
    string node_id = 2;
    string actor_id = 3;
    string permission = 4;
    string actor_type = 5;
    int64 expires_at = 6;
}

message ShareNodeResponse {
    bool success = 1;
    string error = 2;
}

message RevokeAccessRequest {
    RequestContext context = 1;
    string node_id = 2;
    string actor_id = 3;
}

message RevokeAccessResponse {
    bool found = 1;
    string error = 2;
}

message ListSharedWithMeRequest {
    RequestContext context = 1;
    int32 limit = 2;
    int32 offset = 3;
}

message ListSharedWithMeResponse {
    repeated Node nodes = 1;
    bool has_more = 2;
}

message GroupMemberRequest {
    RequestContext context = 1;
    string group_id = 2;
    string member_actor_id = 3;
    string role = 4;
}

message GroupMemberResponse {
    bool success = 1;
    string error = 2;
}

message TransferOwnershipRequest {
    RequestContext context = 1;
    string node_id = 2;
    string new_owner = 3;
}

message TransferOwnershipResponse {
    bool found = 1;
    string error = 2;
}

// User registry messages

message UserInfo {
    string user_id = 1;
    string email = 2;
    string name = 3;
    string status = 4;
    int64 created_at = 5;
    int64 updated_at = 6;
}

message CreateUserRequest {
    // Actor performing the operation (must be admin or system)
    string actor = 1;
    string user_id = 2;
    string email = 3;
    string name = 4;
}

message CreateUserResponse {
    bool success = 1;
    UserInfo user = 2;
    string error = 3;
}

message GetUserRequest {
    string actor = 1;
    string user_id = 2;
}

message GetUserResponse {
    bool found = 1;
    UserInfo user = 2;
}

message UpdateUserRequest {
    // Actor performing the operation (must be the user themselves or admin)
    string actor = 1;
    string user_id = 2;
    string email = 3;
    string name = 4;
    string status = 5;
}

message UpdateUserResponse {
    bool success = 1;
    string error = 2;
}

message ListUsersRequest {
    string actor = 1;
    string status = 2;
    int32 limit = 3;
    int32 offset = 4;
}

message ListUsersResponse {
    repeated UserInfo users = 1;
}

// Tenant registry messages

message TenantDetail {
    string tenant_id = 1;
    string name = 2;
    string status = 3;
    int64 created_at = 4;
}

message CreateTenantRequest {
    string actor = 1;
    string tenant_id = 2;
    string name = 3;
}

message CreateTenantResponse {
    bool success = 1;
    TenantDetail tenant = 2;
    string error = 3;
}

message GetTenantRequest {
    string actor = 1;
    string tenant_id = 2;
}

message GetTenantResponse {
    bool found = 1;
    TenantDetail tenant = 2;
}

message ArchiveTenantRequest {
    string actor = 1;
    string tenant_id = 2;
}

message ArchiveTenantResponse {
    bool success = 1;
    string error = 2;
}

// Tenant membership messages

message TenantMemberInfo {
    string tenant_id = 1;
    string user_id = 2;
    string role = 3;
    int64 joined_at = 4;
}

message TenantMemberRequest {
    string actor = 1;
    string tenant_id = 2;
    string user_id = 3;
    string role = 4;
}

message TenantMemberResponse {
    bool success = 1;
    string error = 2;
}

message GetTenantMembersRequest {
    string actor = 1;
    string tenant_id = 2;
}

message GetTenantMembersResponse {
    repeated TenantMemberInfo members = 1;
}

message GetUserTenantsRequest {
    string actor = 1;
    string user_id = 2;
}

message GetUserTenantsResponse {
    repeated TenantMemberInfo memberships = 1;
}

message ChangeMemberRoleRequest {
    string actor = 1;
    string tenant_id = 2;
    string user_id = 3;
    string new_role = 4;
}

message ChangeMemberRoleResponse {
    bool success = 1;
    string error = 2;
}
